<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Жив Монитор на Производството</title>
  <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ТЪМНА ПРОМИШЛЕНА ТЕМА */
    :root {
      --bg-color: #0f172a; 
      --card-bg: transparent; 
      --text-main: #f8fafc; 
      --text-muted: #94a3b8;
      --border-color: #334155; 
      --header-bg: #1e293b;
    }
    
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; box-sizing: border-box; }

    body { font-family: 'Sofia Sans', sans-serif; background-color: var(--bg-color); margin: 8px; color: var(--text-main); overflow: auto; }
    
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 1000; font-weight: 800; font-size: 24px; letter-spacing: 2px; flex-direction: column; text-align: center; padding: 20px;}
    #error-box { color: #ef4444; margin-top: 20px; font-size: 18px; max-width: 800px; word-wrap: break-word; }
    #svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }

    /* СТРУКТУРА НА ТАБЛОТО */
    .layout-wrapper { display: flex; flex-direction: column; gap: 12px; min-height: 95vh; position: relative; z-index: 10; min-width: max-content; padding-right: 12px; padding-bottom: 20px;}
    
    .top-section { display: flex; gap: 12px; min-width: max-content; flex: 1; }
    .left-zone { display: flex; flex-direction: row; gap: 12px; min-width: max-content; flex: 4; }
    .right-zone { display: flex; flex-direction: column; min-width: 350px; flex: 1; }

    .bottom-section { display: flex; gap: 12px; min-width: max-content; flex: 1.5; }

    /* ПРОЗОРЦИ */
    .window { background: var(--header-bg); border: 1px solid var(--border-color); border-radius: 6px; display: flex; flex-direction: column; box-shadow: 0 8px 20px rgba(0,0,0,0.4); flex: 1; min-width: max-content; overflow: hidden; }
    
    .window-header { 
      color: #f8fafc; padding: 10px 14px; font-size: 14px; font-weight: 900; 
      letter-spacing: 1.5px; text-transform: uppercase; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex; align-items: center;
    }
    
    .window-body { padding: 12px; display: flex; flex-direction: column; gap: 16px; flex-grow: 1; }

    /* ЗОНИ И ЛЕНТИ */
    .lane { padding-bottom: 6px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 4px; border: none; }
    .lane:last-child { margin-bottom: 0; padding-bottom: 0; }
    
    .columns-mode { flex-direction: row !important; gap: 20px; }
    .col-lane { padding-right: 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; border: none; }
    .col-lane:last-child { padding-right: 0; }

    .lane-title { font-size: 12px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: inline-block; letter-spacing: 1px;}

    .plan-group { border-left: 3px solid #475569; padding-left: 12px; margin-bottom: 8px; display: flex; flex-direction: column; }
    .plan-label { font-size: 13px; font-weight: 800; color: #f8fafc; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
    .family-row { display: flex; flex-direction: row; gap: 30px; padding: 5px 0; border-bottom: none; align-items: center; }
    .family-row:last-child { border-bottom: none; padding-bottom: 0; }
    .bom-column { display: flex; flex-direction: column; gap: 14px; justify-content: center; position: relative; z-index: 2;}

    .tooltip-container { position: relative; display: inline-block; }
    .material-warning-trigger { cursor: pointer; font-size: 14px; font-weight: bold; color: #ef4444; margin-left: 2px; user-select: none; }
    .vsm-tooltip { display: none; position: absolute; left: 50%; bottom: 125%; transform: translateX(-50%); background: #020617; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; font-weight: 800; z-index: 110; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid #ef4444; }
    .vsm-tooltip::before { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border-width: 5px; border-style: solid; border-color: #020617 transparent transparent transparent; }

    /* ВИЗУАЛИЗАЦИЯ НА ДЕТАЙЛИТЕ */
    .vsm-node { display: flex; flex-direction: column; gap: 2px; padding: 0; width: max-content; background: transparent; border: none; }
    .vsm-header { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; border: none; padding-bottom: 2px; margin-bottom: 0px;}
    
    .vsm-title { font-size: 16px; font-weight: 900; letter-spacing: 0.5px; }
    .title-green { color: #22c55e !important; }      
    .title-blue { color: #60a5fa !important; }      
    .title-yellow { color: #facc15 !important; text-shadow: 0 0 10px rgba(250,204,21,0.3); } 
    .title-gray { color: #cbd5e1 !important; }      
    
    .vsm-qty { font-size: 14px; font-weight: 800; color: #64748b; }

    /* ОПЕРАЦИИ */
    .vsm-ops { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
    .op-text { white-space: nowrap; font-family: 'Sofia Sans', sans-serif; }
    
    /* Завършена операция (малка и зелена) */
    .op-past { font-size: 13px; font-weight: 600; color: #22c55e; opacity: 0.9; }
    
    /* Текуща операция (голяма) */
    .op-focus { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
    .op-focus.active { color: #60a5fa; text-shadow: 0 0 8px rgba(59,130,246,0.4); } /* Започната (Синя) */
    .op-focus.waiting { color: #94a3b8; } /* Още не е започната (Сива) */
    
    /* Следваща операция (малка и сива) */
    .op-future { font-size: 13px; font-weight: 600; color: #64748b; opacity: 0.7; }

    /* Всички операции са приключили (голямо зелено) */
    .op-finished-all { font-size: 18px; font-weight: 900; color: #22c55e; text-shadow: 0 0 8px rgba(34,197,94,0.4); }
    
    /* БУТОНИ ЗА РАЗГЪВАНЕ (ТРИ ТОЧКИ) */
    .harmony-toggle { 
        color: #64748b; font-weight: 900; font-size: 16px; cursor: pointer; 
        user-select: none; transition: all 0.2s; padding: 0 6px; 
        background: rgba(255,255,255,0.05); border-radius: 4px; display: inline-block;
    }
    .harmony-toggle:hover { color: #60a5fa; background: rgba(255,255,255,0.1); }
    .hidden-history { display: none !important; }

    .arr { color: #475569; font-weight: bold; font-size: 12px; margin: 0 2px;}
    .machine-view .hide-on-machine { display: none !important; }
  </style>
</head>
<body>

  <div id="loading">
    <div>Сглобяване на VSM потока от Supabase... ⚙️</div>
    <div id="error-box"></div>
  </div>
  
  <svg id="svg-overlay"></svg>

  <div class="layout-wrapper">
    <div class="top-section">
      <div class="left-zone">
        <div class="window"><div class="window-header" style="border-top: 3px solid #3b82f6; background: linear-gradient(180deg, rgba(59,130,246,0.1) 0%, transparent 100%);">ТЕЛА</div><div class="window-body" id="w-tiela"></div></div>
        <div class="window"><div class="window-header" style="border-top: 3px solid #fb923c; background: linear-gradient(180deg, rgba(251,146,60,0.1) 0%, transparent 100%);">ПРЕДНИ КАПАЦИ</div><div class="window-body" id="w-predni"></div></div>
        <div class="window"><div class="window-header" style="border-top: 3px solid #c084fc; background: linear-gradient(180deg, rgba(192,132,252,0.1) 0%, transparent 100%);">ЗАДНИ КАПАЦИ</div><div class="window-body" id="w-zadni"></div></div>
        <div class="window"><div class="window-header" style="border-top: 3px solid #fb7185; background: linear-gradient(180deg, rgba(251,113,133,0.1) 0%, transparent 100%);">МПР</div><div class="window-body" id="w-mpr"></div></div>
      </div>
      
      <div class="right-zone">
        <div class="window" style="height: 100%;">
          <div class="window-header" style="border-top: 3px solid #f8fafc; background: linear-gradient(180deg, rgba(248,250,252,0.1) 0%, transparent 100%);">КРАЙНИ ПРОДУКТИ (СГЛОБЯВАНЕ)</div>
          <div class="window-body" id="w-assembly"></div>
        </div>
      </div>
    </div>
    
    <div class="bottom-section">
      <div class="window" style="flex: 2.2;">
        <div class="window-header" style="border-top: 3px solid #94a3b8; background: linear-gradient(180deg, rgba(148,163,184,0.1) 0%, transparent 100%);">РОТОРИ - ВАЛОВЕ - ЛАГЕРНИ ВЪЗЛИ</div>
        <div class="window-body" style="padding: 12px;">
          <div class="lane"><span class="lane-title">ВАР. 11</span><div id="w-var11"></div></div>
          <div class="lane"><span class="lane-title">ВАР. 25</span><div id="w-var25"></div></div>
          <div class="lane"><span class="lane-title">ЛАГЕРНИ ВЪЗЛИ</span><div id="w-bearings"></div></div>
        </div>
      </div>
      
      <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px;">
        <div class="window" style="flex: 1.2;">
          <div class="window-header" style="border-top: 3px solid #818cf8; background: linear-gradient(180deg, rgba(129,140,248,0.1) 0%, transparent 100%);">МАЛКИ ДЕТАЙЛИ</div>
          <div class="window-body columns-mode">
            <div class="col-lane"><span class="lane-title">ЩИФТОВЕ</span><div id="w-small-pins"></div></div>
            <div class="col-lane"><span class="lane-title">ШПИЛКИ</span><div id="w-small-studs"></div></div>
            <div class="col-lane"><span class="lane-title">ПАКЕТИ</span><div id="w-small-rotors"></div></div>
            <div class="col-lane"><span class="lane-title">МАКАРИЧКИ</span><div id="w-small-spools"></div></div>
            <div class="col-lane"><span class="lane-title">ДРУГИ</span><div id="w-small-others"></div></div>
          </div>
        </div>

        <div class="window" style="flex: 1;">
          <div class="window-header" style="border-top: 3px solid #f43f5e; background: linear-gradient(180deg, rgba(244,63,94,0.1) 0%, transparent 100%);">СТАТОРИ И ТРАНСФОРМАТОРИ</div>
          <div class="window-body" id="w-statori"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if(new URLSearchParams(window.location.search).get('view') === 'machine') {
        document.body.classList.add('machine-view');
    }

    const client = supabase.createClient(
        'https://zdythzcgcjxwbxufunuh.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE'
    );
    
    let globalConnections = [];
    let domIdMap = {};
    let domIdCounter = 0;
    
    function getDomId(realId) {
        if (!domIdMap[realId]) {
            domIdCounter++;
            domIdMap[realId] = 'node_' + domIdCounter;
        }
        return domIdMap[realId];
    }
    
    window.onload = function() {
      loadData();
      setInterval(loadData, 30000); 
    };

    function toggleHarmony(idStr) {
        const histEl = document.getElementById('hist_' + idStr);
        const btnEl = document.getElementById('btn_' + idStr);
        if (histEl && btnEl) {
            if (histEl.classList.contains('hidden-history')) {
                histEl.classList.remove('hidden-history');
                btnEl.style.color = '#60a5fa'; 
                btnEl.style.background = 'rgba(59,130,246,0.15)';
            } else {
                histEl.classList.add('hidden-history');
                btnEl.style.color = '';
                btnEl.style.background = '';
            }
            setTimeout(() => drawArrows(), 50);
        }
    }

    async function loadData() {
        try {
            // ТЕГЛИМ ВСИЧКИ ДАННИ ОТ БАЗАТА ДИРЕКТНО (ВМЕСТО ЧРЕЗ ИЗГЛЕДА)
            const [plansRes, bomRes, routesRes, reportsRes, skladRes, nomRes] = await Promise.all([
                client.from('plan').select('*').eq('Статус', 'Активен').limit(5000),
                client.from('bom').select('*').limit(50000),
                client.from('marshruti').select('*').limit(50000),
                client.from('otcheti').select('*').limit(50000),
                client.from('sklad').select('*').limit(50000),
                client.from('Номенклатура').select('*').limit(50000)
            ]);

            if (plansRes.error) throw plansRes.error;
            const plansData = plansRes.data || [];

            if (plansData.length === 0) {
                document.getElementById('loading').style.display = 'none';
                return;
            }

            // ПОДГОТВЯМЕ РЕЧНИЦИТЕ
            let nomMap = {};
            if (nomRes.data) {
                nomRes.data.forEach(n => {
                    if (n['ID Детайл']) nomMap[String(n['ID Детайл']).trim().toLowerCase()] = n;
                });
            }

            let skladMap = {};
            if (skladRes.data) {
                skladRes.data.forEach(s => {
                    if (s['ID Детайл']) skladMap[String(s['ID Детайл']).trim().toLowerCase()] = parseFloat(s['Остатък']) || 0;
                });
            }

            let completedOps = {};
            if (reportsRes.data) {
                reportsRes.data.forEach(r => {
                    let key = String(r['ID Детайл']).trim() + '_' + String(r['Операция']).trim();
                    let qty = parseFloat(r['Количество']) || 0;
                    if (r['Статус'] === 'Отчетено') {
                        completedOps[key] = (completedOps[key] || 0) + qty;
                    }
                });
            }

            let routesByDetail = {};
            if (routesRes.data) {
                routesRes.data.forEach(r => {
                    let code = String(r['Код на детайла']).trim();
                    if(!routesByDetail[code]) routesByDetail[code] = [];
                    routesByDetail[code].push(r);
                });
                Object.keys(routesByDetail).forEach(code => {
                    routesByDetail[code].sort((a, b) => parseInt(a['№ Операция']) - parseInt(b['№ Операция']));
                });
            }

            let bomChildrenMap = {};
            if (bomRes.data) {
                bomRes.data.forEach(b => {
                    let p = String(b['ID Родител']).trim().toLowerCase();
                    if(!bomChildrenMap[p]) bomChildrenMap[p] = [];
                    bomChildrenMap[p].push(b);
                });
            }

            let planMap = {};
            let explicitPlanItems = new Set(); 
            let activeNodes = [];

            // =====================================================================
            // УМЕН ПРЕВОДАЧ ЗА МЕСЕЧНИЯ ПЛАН (ПРЕВЕЖДА ЧИСЛО В ИМЕ)
            // =====================================================================
            plansData.forEach(p => { 
                planMap[p.id] = p; 
                
                let originalPlanCode = String(p['ID Детайл']).trim();
                let actualBomName = originalPlanCode;
                let displayName = originalPlanCode;
                let targetQty = parseFloat(p['Целево количество']) || 0;

                // Проверяваме дали това цифрово име го има като "Вътрешно име" в Номенклатура
                if (nomRes.data) {
                    let translated = nomRes.data.find(n => String(n['Вътрешно име']).trim() === originalPlanCode);
                    if (translated && translated['ID Детайл']) {
                        actualBomName = String(translated['ID Детайл']).trim();
                        // Ако го намерим, за екрана слепваме цифрата и текста!
                        displayName = `${originalPlanCode} - ${actualBomName}`; 
                    }
                }

                explicitPlanItems.add(`${p.id}___${actualBomName.toUpperCase()}`);

                function traverseAndAdd(parentName, currentCode, requiredQty, isRootLevel) {
                    let currentCodeLower = currentCode.toLowerCase();
                    let nomEntry = nomMap[currentCodeLower] || {};
                    let children = bomChildrenMap[currentCodeLower] || [];
                    
                    // АНТИ-СПАМ ФИЛТЪР ЗА СУРОВИНИ:
                    // Пропускаме детайли, които нямат маршрути (операции) И нямат БОМ деца (напр. кабели, тиксо)
                    let isRawMaterial = (children.length === 0) && (!routesByDetail[currentCode]);
                    if (isRawMaterial && !isRootLevel) return;

                    activeNodes.push({
                        plan_id: p.id,
                        code: currentCode,
                        display_name: isRootLevel ? displayName : currentCode, // Показва дългото име само на началния детайл
                        plan_qty: requiredQty,
                        parent_code: parentName,
                        ready_qty: skladMap[currentCodeLower] || 0,
                        drawing_url: nomEntry['Линк към чертеж'] || '',
                        part_type: nomEntry['Тип'] || ''
                    });

                    children.forEach(c => {
                        let childName = String(c['ID Компонент']).trim();
                        let multiplier = parseFloat(c['Количество']) || 1;
                        traverseAndAdd(currentCode, childName, requiredQty * multiplier, false);
                    });
                }

                traverseAndAdd('', actualBomName, targetQty, true);
            });

            // ГРУПИРАНЕ И СЪЗДАВАНЕ НА ВРЪЗКИ
            let mergedNodes = {};
            let connections = [];

            activeNodes.forEach(row => {
                let pData = planMap[row.plan_id];
                let pMonthStr = pData ? `${pData['Месец']} ${pData['Година']}` : `ПЛАН ${row.plan_id}`;
                let codeStr = row.code ? String(row.code).trim() : "";
                
                let mergedId = pMonthStr + '___' + codeStr;

                if (!mergedNodes[mergedId]) {
                    mergedNodes[mergedId] = {
                        id: mergedId,
                        planId: row.plan_id, 
                        planMonth: pMonthStr,
                        code: codeStr,
                        displayName: row.display_name, // ТУК ИЗПОЛЗВАМЕ ИМЕТО ЗА ЕКРАНА
                        planQty: 0, 
                        warehouseQty: row.ready_qty || 0,
                        globalState: 'gray',
                        operations: [],
                        drawingUrl: row.drawing_url,
                        partType: row.part_type ? String(row.part_type) : ""
                    };
                }

                mergedNodes[mergedId].planQty += (parseFloat(row.plan_qty) || 0);

                if (row.parent_code) {
                    let parentCodeStr = String(row.parent_code).trim();
                    let parentMergedId = pMonthStr + '___' + parentCodeStr;
                    
                    if (!connections.find(c => c.from === mergedId && c.to === parentMergedId)) {
                        connections.push({ from: mergedId, to: parentMergedId });
                    }
                }
            });

            let masterData = {
                tiela: [], predni: [], zadni: [], mpr: [], statori: [], assembly: [],
                var11: [], var25: [], bearings: [],
                small_pins: [], small_studs: [], small_rotors: [], small_spools: [], small_others: []
            };

            Object.values(mergedNodes).forEach(n => {
                let partRoutes = routesByDetail[n.code] || [];

                if (partRoutes.length > 0) {
                    partRoutes.forEach(route => {
                        let opName = String(route['Име на операция']).trim();
                        let opKey = n.code + '_' + opName;
                        let doneQty = completedOps[opKey] || 0;
                        n.operations.push({ name: opName, completed: doneQty });
                    });
                } else {
                    n.operations.push({ 
                        name: n.warehouseQty >= n.planQty ? 'Готов (Склад)' : 'Чакащ (Доставка)', 
                        completed: n.warehouseQty || 0 
                    });
                }

                let typeStr = (n.partType + " " + n.code).toLowerCase().replace(/[\s\.\-\_]+/g, '');
                
                let searchKey = `${n.planId}___${n.code.toUpperCase()}`;
                
                let isDirectlyInPlan = explicitPlanItems.has(`${n.planId}___${n.code.toUpperCase()}`);
                let baseCode = n.code.toUpperCase().replace(/#+$/, '').trim();
                let isHashVariantOfPlan = n.code.includes('#') && explicitPlanItems.has(`${n.planId}___${baseCode}`);

                if (isDirectlyInPlan || isHashVariantOfPlan) {
                    masterData.assembly.push(n);
                } 
                else if (typeStr.includes("тяло") || typeStr.includes("тела")) masterData.tiela.push(n);
                else if (typeStr.includes("преден") || typeStr.includes("предни") || typeStr.includes("преденкапак")) masterData.predni.push(n);
                else if (typeStr.includes("заден") || typeStr.includes("задни") || typeStr.includes("заденкапак")) masterData.zadni.push(n);
                else if (typeStr.includes("мпр")) masterData.mpr.push(n);
                else if (typeStr.includes("пакет")) masterData.small_rotors.push(n);
                else if (typeStr.includes("статор") || typeStr.includes("трансформатор")) masterData.statori.push(n);
                else if (typeStr.includes("ротор") && typeStr.includes("11")) masterData.var11.push(n);
                else if (typeStr.includes("ротор") && typeStr.includes("25")) masterData.var25.push(n);
                else if (typeStr.includes("лагер")) masterData.bearings.push(n);
                else {
                    if (typeStr.includes("щифт")) masterData.small_pins.push(n);
                    else if (typeStr.includes("шпилк")) masterData.small_studs.push(n);
                    else if (typeStr.includes("макар")) masterData.small_spools.push(n);
                    else masterData.small_others.push(n);
                }
            });

            drawDashboard(JSON.stringify({ nodes: masterData, connections: connections }));

        } catch (err) {
            document.getElementById('error-box').innerText = "Грешка: " + err.message;
            document.getElementById('loading').style.display = 'none';
        }
    }

    function toggleTooltip(event, nodeId) {
      if (event) event.stopPropagation();
      const el = document.getElementById('tooltip_' + nodeId);
      if (el) {
        const isHidden = el.style.display === 'none' || el.style.display === '';
        document.querySelectorAll('.vsm-tooltip').forEach(t => t.style.display = 'none');
        el.style.display = isHidden ? 'block' : 'none';
      }
    }

    document.addEventListener('click', function() {
      document.querySelectorAll('.vsm-tooltip').forEach(t => t.style.display = 'none');
    });

    function drawDashboard(jsonString) {
      if (!jsonString) return;
      const data = JSON.parse(jsonString);
      if (data.error) { document.getElementById('error-box').innerText = data.error; return; }

      document.getElementById('loading').style.display = 'none';
      globalConnections = data.connections || [];
      
      domIdMap = {};
      domIdCounter = 0;

      const allNodesMap = {};
      if (data.nodes) {
        Object.values(data.nodes).forEach(bucket => {
          if(Array.isArray(bucket)) bucket.forEach(n => allNodesMap[n.id] = n);
        });
      }
      
      const childMap = {}; 
      const parentMap = {};
      globalConnections.forEach(c => {
         if (!childMap[c.to]) childMap[c.to] = [];
         childMap[c.to].push(c.from);
         parentMap[c.from] = c.to;
      });

      const renderFamilyBOMBucket = (nodeArray, containerId) => {
        const container = document.getElementById(containerId);
        if (!container) return;
        if (!nodeArray || !Array.isArray(nodeArray) || nodeArray.length === 0) {
            container.innerHTML = '';
            return;
        }

        const plans = {};
        nodeArray.forEach(n => {
          if (!plans[n.planMonth]) plans[n.planMonth] = [];
          plans[n.planMonth].push(n);
        });
        
        let finalHTML = '';

        for (const [planMonth, nodes] of Object.entries(plans)) {
          const nodeIds = new Set(nodes.map(n => n.id));
          const adj = {};
          nodes.forEach(n => adj[n.id] = []);

          const localConns = globalConnections.filter(c => nodeIds.has(c.from) && nodeIds.has(c.to));
          localConns.forEach(c => {
            adj[c.from].push(c.to);
            adj[c.to].push(c.from); 
          });
          
          const visited = new Set();
          const families = [];

          nodes.forEach(n => {
            if (!visited.has(n.id)) {
              const familyNodes = [];
              const queue = [n.id];
              visited.add(n.id);

              while (queue.length > 0) {
                const curr = queue.shift();
                familyNodes.push(nodes.find(x => x.id === curr));
                adj[curr].forEach(neighbor => {
                  if (!visited.has(neighbor)) {
                    visited.add(neighbor);
                    queue.push(neighbor);
                  }
                });
              }
              families.push(familyNodes);
            }
          });
          
          let planHTML = `<div class="plan-group"><div class="plan-label">ПЛАН: ${planMonth}</div>`;

          families.forEach(famNodes => {
            const childrenMap = {};
            famNodes.forEach(n => childrenMap[n.id] = []);
            
            globalConnections.forEach(c => {
              if (childrenMap.hasOwnProperty(c.from) && childrenMap.hasOwnProperty(c.to)) {
                childrenMap[c.to].push(c.from); 
              }
            });

            const calculatedLevels = {};
            const visitedForLevel = new Set(); 
            function getBottomUpLevel(nodeId) {
              if (calculatedLevels[nodeId]) return calculatedLevels[nodeId];
              if (visitedForLevel.has(nodeId)) return 1; 
              visitedForLevel.add(nodeId);
              if (calculatedLevels[nodeId]) return calculatedLevels[nodeId];
              
              const children = childrenMap[nodeId];
              if (!children || children.length === 0) {
                calculatedLevels[nodeId] = 1;
                return 1;
              }
              
              let maxChildLevel = 0;
              children.forEach(childId => {
                const childLevel = getBottomUpLevel(childId);
                if (childLevel > maxChildLevel) maxChildLevel = childLevel;
              });
              calculatedLevels[nodeId] = maxChildLevel + 1; 
              return calculatedLevels[nodeId];
            }

            const levels = {};
            famNodes.forEach(fn => {
              const lvl = getBottomUpLevel(fn.id);
              if (!levels[lvl]) levels[lvl] = [];
              levels[lvl].push(fn);
            });
            
            let familyHTML = `<div class="family-row">`;
            const sortedLevels = Object.keys(levels).map(Number).sort((a, b) => a - b);
            
            sortedLevels.forEach(lvl => {
              let colHTML = `<div class="bom-column">`;
              
              levels[lvl].forEach(node => {
                let dId = getDomId(node.id);

                const isRoot = !parentMap[node.id]; 
                const rootMarker = isRoot ? '<span style="margin-right:4px; color:#fb923c;" title="Краен Продукт">🔸</span>' : '';
                
                const warehouseQty = node.warehouseQty || 0; 
                const drawingLinkHTML = (node.drawingUrl && node.drawingUrl.startsWith('http')) 
                  ? `<a href="${node.drawingUrl}" target="_blank" style="text-decoration:none; margin-left:6px;" title="Отвори чертеж">📐</a>` : '';

                let opsHTML = '';
                let titleClass = 'title-gray';

                let children = childMap[node.id] || [];
                let allChildrenDone = true;
                let anyChildDone = false;
                
                if (children.length > 0) {
                    allChildrenDone = children.every(cId => {
                        let chNode = allNodesMap[cId];
                        if(!chNode || !chNode.operations) return false;
                        return chNode.operations.findIndex(o => o.completed < chNode.planQty) === -1;
                    });

                    anyChildDone = children.some(cId => {
                        let chNode = allNodesMap[cId];
                        if(!chNode || !chNode.operations) return false;
                        return chNode.operations.findIndex(o => o.completed < chNode.planQty) === -1;
                    });
                }

                let hasStarted = false;
                if (node.operations && node.operations.length > 0) {
                    hasStarted = node.operations.some(o => o.completed > 0);
                }

                let shouldShowOps = true;
                if (children.length > 0 && !hasStarted && !anyChildDone) {
                    shouldShowOps = false;
                }

                if (shouldShowOps && node.operations.length > 0) {
                    let len = node.operations.length;
                    let currIdx = node.operations.findIndex(o => o.completed < node.planQty);

                    const formatPast = (op) => `<span class="op-text op-past">${op.name} | ${op.completed}/${node.planQty}</span>`;
                    const formatFuture = (op) => `<span class="op-text op-future">${op.name} | 0/${node.planQty}</span>`;
                    const formatFocusBlue = (op) => `<span class="op-text op-focus active">${op.name} | ${op.completed}/${node.planQty}</span>`;
                    const formatFocusGray = (op) => `<span class="op-text op-focus waiting">${op.name} | ${op.completed}/${node.planQty}</span>`;
                    const formatFocusGreen = (op) => `<span class="op-text op-finished-all">${op.name} | ${op.completed}/${node.planQty}</span>`;

                    let pastHiddenArr = [];
                    let futureHiddenArr = [];
                    let html = '';

                    if (currIdx === -1) {
                        titleClass = 'title-green';
                        let lastIdx = len - 1;
                        
                        for(let i=0; i < lastIdx; i++) pastHiddenArr.push(formatPast(node.operations[i]));
                        if(pastHiddenArr.length > 0) {
                            html += `<span class="harmony-toggle" onclick="toggleHarmony('past_${dId}')" id="btn_past_${dId}">⋯</span> `;
                            html += `<span id="hist_past_${dId}" class="hidden-history">${pastHiddenArr.join(' <span class="arr">➔</span> ')} <span class="arr">➔</span> </span>`;
                        }
                        html += formatFocusGreen(node.operations[lastIdx]);
                    } else {
                        let isWorking = node.operations[currIdx].completed > 0;
                        if (isWorking) titleClass = 'title-blue';

                        for(let i=0; i < currIdx; i++) pastHiddenArr.push(formatPast(node.operations[i]));
                        if(pastHiddenArr.length > 0) {
                            html += `<span class="harmony-toggle" onclick="toggleHarmony('past_${dId}')" id="btn_past_${dId}">⋯</span> `;
                            html += `<span id="hist_past_${dId}" class="hidden-history">${pastHiddenArr.join(' <span class="arr">➔</span> ')} <span class="arr">➔</span> </span>`;
                        }
                        
                        html += isWorking ? formatFocusBlue(node.operations[currIdx]) : formatFocusGray(node.operations[currIdx]);
                        
                        for(let i = currIdx + 1; i < len; i++) futureHiddenArr.push(formatFuture(node.operations[i]));
                        if(futureHiddenArr.length > 0) {
                            html += `<span id="hist_future_${dId}" class="hidden-history"> <span class="arr">➔</span> ${futureHiddenArr.join(' <span class="arr">➔</span> ')}</span>`;
                            html += ` <span class="harmony-toggle" onclick="toggleHarmony('future_${dId}')" id="btn_future_${dId}">⋯</span>`;
                        }
                    }

                    opsHTML = `<div class="vsm-ops">${html}</div>`;
                }
                
                if (children.length > 0 && allChildrenDone && isRoot && titleClass !== 'title-green') {
                    titleClass = 'title-yellow'; 
                }

                colHTML += `
                  <div class="vsm-node" id="card_${dId}">
                    <div class="vsm-header">
                      <span class="vsm-title ${titleClass}">${rootMarker}${node.displayName}${drawingLinkHTML}</span>
                      <span class="vsm-qty">| ${warehouseQty}/${node.planQty}</span>
                    </div>
                    ${opsHTML !== '' ? opsHTML : ''}
                  </div>
                `;
              });
              colHTML += `</div>`;
              familyHTML += colHTML;
            });
            familyHTML += `</div>`;
            planHTML += familyHTML;
          });
          planHTML += `</div>`;
          finalHTML += planHTML;
        }
        container.innerHTML = finalHTML;
      };

      renderFamilyBOMBucket(data.nodes.tiela || [], 'w-tiela');
      renderFamilyBOMBucket(data.nodes.predni || [], 'w-predni');
      renderFamilyBOMBucket(data.nodes.zadni || [], 'w-zadni');
      renderFamilyBOMBucket(data.nodes.mpr || [], 'w-mpr');
      
      renderFamilyBOMBucket(data.nodes.rotors_var11 || data.nodes.var11 || [], 'w-var11');
      renderFamilyBOMBucket(data.nodes.rotors_var25 || data.nodes.var25 || [], 'w-var25');
      renderFamilyBOMBucket(data.nodes.bearings || [], 'w-bearings');
      
      renderFamilyBOMBucket(data.nodes.small_pins || [], 'w-small-pins');
      renderFamilyBOMBucket(data.nodes.small_studs || [], 'w-small-studs');
      renderFamilyBOMBucket(data.nodes.small_rotors || [], 'w-small-rotors');
      renderFamilyBOMBucket(data.nodes.small_spools || [], 'w-small-spools'); 
      renderFamilyBOMBucket(data.nodes.small_others || [], 'w-small-others');
      
      renderFamilyBOMBucket(data.nodes.statori || [], 'w-statori');
      renderFamilyBOMBucket(data.nodes.assembly || [], 'w-assembly');

      const othersContainer = document.getElementById('w-small-others');
      if (othersContainer && othersContainer.innerHTML.trim() === '') {
          const parentCol = othersContainer.closest('.col-lane');
          if(parentCol) parentCol.style.display = 'none';
      }

      setTimeout(() => {
        drawArrows();
        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
      }, 800);
    }

    function drawArrows() {
      const svg = document.getElementById('svg-overlay');
      if (!svg) return;
      
      svg.style.height = document.documentElement.scrollHeight + "px";
      svg.style.width = document.documentElement.scrollWidth + "px";
      
      let html = `<defs><marker id="arrow" viewBox="0 0 14 14" refX="10" refY="7" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 14 7 L 0 14 z" fill="#475569" /></marker></defs>`;
      
      globalConnections.forEach(conn => {
        let childDId = domIdMap[conn.from];
        let parentDId = domIdMap[conn.to];
        if (!childDId || !parentDId) return;

        const cardChild = document.getElementById(`card_${childDId}`);
        const cardParent = document.getElementById(`card_${parentDId}`);
        
        if (cardChild && cardParent) {
          const winChild = cardChild.closest('.window-body');
          const winParent = cardParent.closest('.window-body');
          if (winChild !== winParent) return;

          const sourceEl = cardChild.querySelector('.vsm-title');
          const targetEl = cardParent.querySelector('.vsm-title');

          if (sourceEl && targetEl) {
              const rs = sourceEl.getBoundingClientRect();
              const rt = targetEl.getBoundingClientRect();

              const startX = rs.right + window.scrollX + 4;
              const startY = rs.top + window.scrollY + (rs.height / 2);
              const endX = rt.left - 6 + window.scrollX;
              const endY = rt.top + window.scrollY + (rt.height / 2);
              
              const cpX = startX + (endX - startX) * 0.4;
              
              html += `<path d="M ${startX} ${startY} C ${cpX} ${startY}, ${cpX} ${endY}, ${endX} ${endY}" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow)" />`;
          }
        }
      });

      svg.innerHTML = html;
    }

    window.addEventListener('resize', () => requestAnimationFrame(drawArrows));
  </script>
</body>
</html>
