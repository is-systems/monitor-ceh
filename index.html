<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Производствен Монитор</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #1a1e29; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #8ab4f8; }
        #dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .operation-card { background: #232838; padding: 20px; border-radius: 8px; border-top: 4px solid #4caf50; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .detail-name { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #ffffff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .operation-step { background: #1c202d; padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .active-op { border-left: 4px solid #4caf50; background: #2a342c; }
        .active-op span { color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Активно производство</h1>
    <div id="dashboard-grid">Зареждане на плана...</div>

    <script>
        const TARGET = 10;
        const client = supabase.createClient(
            'https://zdythzcgcjxwbxufunuh.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE'
        );

        async function init() {
            const grid = document.getElementById('dashboard-grid');

            // 1. Взимаме списъка с планирани детайли
            const { data: planData } = await client.from('plan').select('"ID Детайл"');
            const plannedIds = planData ? new Set(planData.map(p => String(p['ID Детайл']).trim())) : new Set();

            // 2. Взимаме маршрутите
            const { data: mkData } = await client.from('marshruti').select('*');
            let routing = {};
            
            if(mkData) {
                mkData.forEach(row => {
                    let dId = String(row['Код на детайла'] || '').trim();
                    
                    // ФИЛТЪР: Ако има детайли в плана, показваме САМО тях!
                    if (plannedIds.size > 0 && !plannedIds.has(dId)) return;

                    let opName = String(row['Име на операция'] || '').trim();
                    if (!dId || !opName) return;
                    if (!routing[dId]) routing[dId] = [];
                    routing[dId].push(opName);
                });
            }

            // 3. Взимаме отчетите
            const { data: repData } = await client.from('otcheti').select('*');
            let totals = {};
            if(repData) {
                repData.forEach(row => {
                    let dId = String(row['ID Детайл'] || '').trim();
                    let opName = String(row['Операция'] || '').trim();
                    let qty = parseInt(row['Количество']) || 0;
                    if (!totals[dId]) totals[dId] = {};
                    if (!totals[dId][opName]) totals[dId][opName] = 0;
                    totals[dId][opName] += qty;
                });
            }

            // 4. Рендериране
            grid.innerHTML = '';
            const keys = Object.keys(routing);
            
            if (keys.length === 0) {
                grid.innerHTML = "Няма детайли в плана за показване.";
                return;
            }

            keys.forEach(dId => {
                const card = document.createElement('div');
                card.className = 'operation-card';
                card.innerHTML = `<div class="detail-name">${dId}</div><div class="list"></div>`;
                
                let list = card.querySelector('.list');
                let foundActive = false;

                routing[dId].forEach(opName => {
                    let current = (totals[dId] && totals[dId][opName]) ? totals[dId][opName] : 0;
                    let div = document.createElement('div');
                    div.className = 'operation-step' + (current < TARGET && !foundActive ? ' active-op' : '');
                    
                    if(current < TARGET && !foundActive) foundActive = true;
                    
                    div.innerHTML = `<span>${opName}</span><span><b>${current}</b> / ${TARGET}</span>`;
                    list.appendChild(div);
                });
                grid.appendChild(card);
            });
        }
        init();
    </script>
</body>
</html>
