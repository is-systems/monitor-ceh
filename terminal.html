      <ul id="historyList" class="history-list"><li class="history-item" style="color:#94a3b8; text-align:center;">Няма скорошни действия</li></ul>
    </div>

  <script>
      const client = supabase.createClient(
        'https://zdythzcgcjxwbxufunuh.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE'
      );

      let currentOperator = ""; let currentEmail = ""; let currentMachine = "";
      let globalTasks = []; let localHistoryData = []; let globalBomData = []; let globalRoutesByDetail = {};
      let currentTaskFilter = 'all'; let activeTaskId = null; let isUserCheckedIn = false; 
      const WORKSHOP_LAT = 41.8937; const WORKSHOP_LNG = 23.4875;

      async function fetchUserCheckInStatus() {
          if (!currentEmail) return false;
          try {
              const { data, error } = await client.from('chekiraniya').select('Действие, Време').eq('Имейл', currentEmail).order('Време', { ascending: false }).limit(1);
              if (error) return false;
              if (data && data.length > 0) {
                  const lastAction = data[0]['Действие']; const lastTime = new Date(data[0]['Време']); const now = new Date();
                  if (lastAction === 'Влизане' && lastTime.toDateString() === now.toDateString()) return true;
              }
              return false;
          } catch (err) { return false; }
      }

      async function initTerminal() {
          currentOperator = localStorage.getItem('mes_operator'); currentEmail = localStorage.getItem('mes_email'); let savedMachine = localStorage.getItem('mes_machine');
          if (currentEmail) { OneSignalDeferred.push(function(OneSignal) { OneSignal.login(currentEmail); }); }
          if (!currentOperator || !currentEmail) { await setupProfile(); } else { document.getElementById('uiOperatorName').innerText = currentOperator; }
          if (savedMachine === null) { await changeMachine(true); } else { currentMachine = savedMachine; document.getElementById('uiMachineName').innerText = currentMachine || "ВСИЧКИ"; loadTasks(); }
          setInterval(() => { if (!activeTaskId) loadTasks(true); }, 30000); 
      }

      function setTaskFilter(filterType) { currentTaskFilter = filterType; document.querySelectorAll('.t-filter-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('filter_' + filterType).classList.add('active'); renderTasks(globalTasks); }

      function triggerPushPrompt() { OneSignalDeferred.push(function(OneSignal) { OneSignal.Notifications.requestPermission(); }); }

      async function setupProfile() {
          const { value: formValues } = await Swal.fire({
              title: 'Профил Работник',
              html:
                  '<div style="background: #e0e7ff; padding: 10px; border-radius: 8px; margin-bottom: 15px;"><button type="button" onclick="triggerPushPrompt()" style="background: #4338ca; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; width:100%; box-shadow: 0 2px 4px rgba(67,56,202,0.3);">🔔 Поискай известия (Ръчно)</button><p style="font-size: 11px; color: #475569; margin: 5px 0 0 0; text-align: center;">Или използвайте синята камбанка долу вляво.</p></div>' +
                  '<label style="display:block; text-align:left; font-size:14px; font-weight:bold; margin-bottom:5px; color:#475569;">Име и Фамилия</label><input id="swal-name" class="swal2-input" style="margin-top:0;" value="' + (currentOperator || '') + '">' +
                  '<label style="display:block; text-align:left; font-size:14px; font-weight:bold; margin-top:15px; margin-bottom:5px; color:#475569;">Личен Имейл</label><input id="swal-email" class="swal2-input" type="email" style="margin-top:0;" value="' + (currentEmail || '') + '">' +
                  '<div style="margin-top: 25px; border-top: 1px solid #e2e8f0; padding-top: 15px; display: flex; justify-content: center; gap: 10px;"><button type="button" onclick="window.location.href=\'admin.html\'" style="background: transparent; border: 1px solid #cbd5e1; color: #475569; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">🔒 Админ</button><button type="button" onclick="window.location.href=\'index.html\'" style="background: transparent; border: 1px solid #bae6fd; color: #0284c7; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">📺 Монитор</button></div>',
              focusConfirm: false, allowOutsideClick: !!currentOperator, confirmButtonText: 'Запази профила', confirmButtonColor: '#2563eb',
              preConfirm: () => { return [ document.getElementById('swal-name').value.trim(), document.getElementById('swal-email').value.trim() ] }
          });
          if (formValues && formValues[0] && formValues[1]) {
              currentOperator = formValues[0]; currentEmail = formValues[1].toLowerCase();
              localStorage.setItem('mes_operator', currentOperator); localStorage.setItem('mes_email', currentEmail);
              document.getElementById('uiOperatorName').innerText = currentOperator;
              OneSignalDeferred.push(function(OneSignal) { OneSignal.login(currentEmail); });
              Swal.fire({icon: 'success', title: 'Профилът е запазен!', timer: 1500, showConfirmButton: false});
          } else if (!currentOperator) { Swal.fire('Внимание', 'Име и имейл са задължителни!', 'error').then(() => location.reload()); }
      }

      function getDistanceInMeters(lat1, lon1, lat2, lon2) {
          const R = 6371e3; const p1 = lat1 * Math.PI/180; const p2 = lat2 * Math.PI/180;
          const dp = (lat2-lat1) * Math.PI/180; const dl = (lon2-lon1) * Math.PI/180;
          const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
          return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
      }

      function getUserLocation() {
          return new Promise((resolve) => {
              if (!navigator.geolocation) { resolve({ loc: "Не се поддържа", note: "⚠️ GPS НЕ СЕ ПОДДЪРЖА" }); return; }
              navigator.geolocation.getCurrentPosition((pos) => {
                      const lat = pos.coords.latitude; const lng = pos.coords.longitude; const dist = getDistanceInMeters(lat, lng, WORKSHOP_LAT, WORKSHOP_LNG);
                      resolve({ loc: `${lat.toFixed(5)}, ${lng.toFixed(5)}`, note: dist > 200 ? `⚠️ ИЗВЪН ОБЕКТА (${dist}м)` : "" });
                  }, (err) => { resolve({ loc: "GPS Отказан", note: "⚠️ ЛИПСВА ЛОКАЦИЯ" }); }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
              );
          });
      }

      async function processCheckIn(actionType) {
          if (!currentEmail) { Swal.fire('Внимание', 'Моля, въведете вашия имейл в настройките на профила (⚙️).', 'warning'); return; }
          try {
              Swal.fire({ title: 'Проверка...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
              const { data: lastRecord, error: fetchErr } = await client.from('chekiraniya').select('Действие, Време').eq('Имейл', currentEmail).order('Време', { ascending: false }).limit(1);
              if (fetchErr) throw fetchErr;
              if (lastRecord && lastRecord.length > 0) {
                  const lastAction = lastRecord[0]['Действие']; const lastTime = new Date(lastRecord[0]['Време']); const now = new Date();
                  if (lastAction === 'Влизане' && lastTime.toDateString() !== now.toDateString()) {
                      let autoOutTime = new Date(lastTime); autoOutTime.setHours(17, 0, 0, 0);
                      await client.from('chekiraniya').insert([{ "Имейл": currentEmail, "Действие": 'Авто излизане', "Време": autoOutTime.toISOString(), "Локация": "Системно", "Бележка": "Авто корекция" }]);
                  } else {
                      if (actionType === 'Влизане' && lastAction === 'Влизане') { Swal.fire('Внимание!', 'Вече сте чекирани за Влизане днес.', 'info'); return; }
                      if (actionType === 'Излизане' && (lastAction === 'Излизане' || lastAction === 'Авто излизане')) { Swal.fire('Внимание!', 'Вече сте се изписали.', 'info'); return; }
                  }
              }
              Swal.fire({ title: 'Проверка на локация...', allowOutsideClick: false, didOpen: () => Swal.showLoading() }); const geoInfo = await getUserLocation();
              Swal.fire({ title: 'Записване...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
              const { error: insertErr } = await client.from('chekiraniya').insert([{ "Имейл": currentEmail, "Действие": actionType, "Време": new Date().toISOString(), "Локация": geoInfo.loc, "Бележка": geoInfo.note }]);
              if (insertErr) throw insertErr;
              if (actionType === 'Влизане') {
                  let now = new Date();
                  if (now.getHours() >= 8 && 'speechSynthesis' in window) {
                      window.speechSynthesis.cancel(); let msg = new SpeechSynthesisUtterance("Регистрирано е закъснение."); msg.lang = 'bg-BG'; msg.rate = 1.0; msg.pitch = 1.1; window.speechSynthesis.speak(msg);
                  }
              }
              Swal.fire({ icon: actionType === 'Влизане' ? 'success' : 'info', title: 'Успешно!', text: `${actionType} е регистрирано.`, timer: 2000, showConfirmButton: false }).then(() => { loadTasks(true); });
          } catch (err) { console.error(err); Swal.fire('❌ Грешка при връзката', 'Моля, проверете интернета си.', 'error'); }
      }

      function updateHistoryUI() {
        var list = document.getElementById('historyList');
        if (localHistoryData.length === 0) { list.innerHTML = '<li class="history-item" style="color:#94a3b8; text-align:center;">Няма скорошни действия</li>'; return; }
        var html = '';
        localHistoryData.forEach(item => { var color = item.type === 'БРАК' ? '#e74c3c' : '#16a34a'; html += `<li class="history-item"><span class="history-time">${item.time}</span><span><span style="color:${color}; font-weight:bold;">${item.qty} бр.</span> ${item.name}</span></li>`; });
        list.innerHTML = html;
      }
      function toggleHistory() { var panel = document.getElementById('historyPanel'); panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none'; }
      function addLogToHistory(type, qty, taskId) {
         var now = new Date(); var timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
         let taskData = globalTasks.find(t => t.id === taskId); var name = taskData ? (taskData.name) : 'Детайл';
         localHistoryData.unshift({ time: timeStr, type: type, qty: qty, name: name }); if (localHistoryData.length > 6) localHistoryData.pop(); updateHistoryUI();
      }

      async function changeMachine(isInitial = false) {
          Swal.fire({ title: 'Зареждане...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          try {
              const { data, error } = await client.from('marshruti').select('Машина').limit(100000); if (error) throw error;
              let uniqueMachines = []; if (data) data.forEach(r => { let m = r['Машина']; if (m && m.trim() !== "" && !uniqueMachines.includes(m.trim())) uniqueMachines.push(m.trim()); });
              uniqueMachines.sort(); 
              let checkboxHtml = '<div style="text-align:left; margin-top:15px; max-height: 300px; overflow-y: auto;"><div style="display: flex; gap: 10px; margin-bottom: 15px;"><button type="button" onclick="document.querySelectorAll(\'.machine-cb\').forEach(cb => cb.checked = true)" style="flex:1; padding:10px; background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; border-radius:6px; font-weight:bold;">☑️ Всички</button><button type="button" onclick="document.querySelectorAll(\'.machine-cb\').forEach(cb => cb.checked = false)" style="flex:1; padding:10px; background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; border-radius:6px; font-weight:bold;">☐ Изчисти</button></div>';
              let currentSelections = currentMachine ? currentMachine.split(',') : [];
              uniqueMachines.forEach(m => { let isChecked = currentSelections.includes(m) ? 'checked' : ''; checkboxHtml += `<label style="display:flex; align-items:center; margin-bottom:10px; padding:12px; background:#f8fafc; border-radius:6px; border:1px solid #cbd5e1;"><input type="checkbox" class="machine-cb" value="${m}" ${isChecked} style="transform: scale(1.5); margin-right:15px;"><span style="font-weight:700;">${m}</span></label>`; });
              checkboxHtml += '</div>';
              Swal.close();
              const { isConfirmed } = await Swal.fire({ title: 'Работно място', html: checkboxHtml, showCancelButton: !isInitial, allowOutsideClick: !isInitial, confirmButtonText: 'Потвърди', confirmButtonColor: '#2563eb', preConfirm: () => { let selected = []; document.querySelectorAll('.machine-cb:checked').forEach(cb => selected.push(cb.value)); return selected; } });
              if (isConfirmed) {
                  let finalSelection = []; document.querySelectorAll('.machine-cb:checked').forEach(cb => finalSelection.push(cb.value));
                  currentMachine = finalSelection.join(','); localStorage.setItem('mes_machine', currentMachine);
                  document.getElementById('uiMachineName').innerText = (finalSelection.length > 0) ? finalSelection.join(', ') : "ВСИЧКИ";
                  loadTasks();
              }
          } catch (err) { Swal.fire('Gрешка', err.message, 'error'); }
      }

      async function loadTasks(isSilent = false) {
        var container = document.getElementById('tasksContainer');
        if (!isSilent) container.innerHTML = '<div id="loadingMsg" style="text-align:center; padding: 40px; font-weight:bold; color:#64748b; font-size: 1.2em;">Търсене на задачи... 🔄</div>';
        
        try {
            isUserCheckedIn = await fetchUserCheckInStatus();

            const [plansRes, bomRes, routesRes, reportsRes, skladRes, nomRes] = await Promise.all([
                client.from('plan').select('*').eq('Статус', 'Активен').limit(100000), client.from('bom').select('*').limit(100000),
                client.from('marshruti').select('*').limit(100000), client.from('otcheti').select('*').limit(100000), 
                client.from('sklad').select('*').limit(100000), client.from('Номенклатура').select('*').limit(100000) 
            ]);

            if (plansRes.error) throw plansRes.error; if (bomRes.error) throw bomRes.error;
            if (routesRes.error) throw routesRes.error; if (reportsRes.error) throw reportsRes.error;

            let namesMap = {}; if (nomRes.data) nomRes.data.forEach(n => { let code = String(n['ID Детайл']).trim().toLowerCase(); namesMap[code] = n['Вътрешно име'] || ''; });

            globalBomData = bomRes.data || []; globalRoutesByDetail = {};
            routesRes.data.forEach(r => { let code = String(r['Код на детайла']).trim(); if(!globalRoutesByDetail[code]) globalRoutesByDetail[code] = []; globalRoutesByDetail[code].push(r); });
            Object.keys(globalRoutesByDetail).forEach(code => globalRoutesByDetail[code].sort((a, b) => parseInt(a['№ Операция']) - parseInt(b['№ Операция'])));

            let completedOps = {}; let scrappedOps = {}; 
            reportsRes.data.forEach(r => {
                let key = String(r['ID Детайл']).trim() + '_' + String(r['Операция']).trim(); let qty = parseFloat(r['Количество']) || 0;
                if (r['Статус'] === 'Брак') scrappedOps[key] = (scrappedOps[key] || 0) + qty; else completedOps[key] = (completedOps[key] || 0) + qty;
            });

            let skladData = skladRes.data || [];
            let getSkladQty = (code) => { let c = code.toLowerCase(); let item = skladData.find(s => String(s['ID Детайл']).trim().toLowerCase() === c); return item ? (parseFloat(item['Остатък']) || 0) : 0; };

            let planGroups = {}; 
            plansRes.data.forEach(plan => {
                let planId = String(plan['Месец']).trim() + '_' + String(plan['Година']).trim(); 
                let rootItem = String(plan['ID Детайл']).trim(); 
                
                if (nomRes.data) {
                    let translated = nomRes.data.find(n => String(n['Вътрешно име']).trim() === rootItem);
                    if (translated && translated['ID Детайл']) rootItem = String(translated['ID Детайл']).trim();
                }

                let targetQty = parseFloat(plan['Целево количество']) || 0;
                if(!planGroups[planId]) planGroups[planId] = [];
                planGroups[planId].push({ детайл_код: rootItem, общо_необходимо_количество: targetQty });

                function traverseAndAdd(parentName, parentBaseQty) {
                    let parentScrapTotal = 0; for (let key in scrappedOps) if (key.startsWith(parentName + '_')) parentScrapTotal += scrappedOps[key];
                    let actualParentNeed = parentBaseQty + parentScrapTotal;
                    let children = globalBomData.filter(b => String(b['ID Родител']).trim() === parentName);
                    children.forEach(c => {
                        let childName = String(c['ID Компонент']).trim(); let multiplier = parseFloat(c['Количество']) || 1; let childNeededQty = actualParentNeed * multiplier;
                        planGroups[planId].push({ детайл_код: childName, общо_необходимо_количество: childNeededQty });
                        traverseAndAdd(childName, childNeededQty);
                    });
                }
                traverseAndAdd(rootItem, targetQty);
            });

            globalTasks = [];
            for(let planId in planGroups) {
                // СУМИРАМЕ БРОЙКИТЕ (ЗА ДА НЯМА ПОВТАРЯЩИ СЕ КАРТИ)
                let aggregatedBom = {};
                planGroups[planId].forEach(node => {
                    let code = node.детайл_код;
                    if(!aggregatedBom[code]) aggregatedBom[code] = 0;
                    aggregatedBom[code] += node.общо_необходимо_количество;
                });
                
                Object.keys(aggregatedBom).forEach((code, nodeIndex) => {
                    let planQty = aggregatedBom[code];
                    let routes = globalRoutesByDetail[code] || []; if(routes.length === 0) return; 
                    
                    routes.forEach((route, idx) => {
                        let opName = String(route['Име на операция']).trim(); let opKey = code + '_' + opName;
                        let doneQty = completedOps[opKey] || 0; let scrapQty = scrappedOps[opKey] || 0; let consumedHere = doneQty + scrapQty; 
                        let scrapStrictlyDownstream = 0;
                        for(let j = idx + 1; j < routes.length; j++) { let dKey = code + '_' + String(routes[j]['Име на операция']).trim(); scrapStrictlyDownstream += (scrappedOps[dKey] || 0); }
                        let effectivePlanQty = planQty + scrapStrictlyDownstream;

                        if(doneQty >= effectivePlanQty) return; 
                        let maxAllowed = 0; let hasLimit = true; let blockingReasons = []; 

                        if (idx > 0) {
                            let prevRoute = routes[idx - 1]; let prevOpName = String(prevRoute['Име на операция']).trim(); let prevOpKey = code + '_' + prevOpName;
                            let prevDoneQty = completedOps[prevOpKey] || 0; maxAllowed = prevDoneQty - consumedHere;
                            if (maxAllowed <= 0) blockingReasons.push(`Оп. ${prevOpName} (${prevDoneQty} готови)`);
                        } else {
                            let children = globalBomData.filter(b => String(b['ID Родител']).trim() === code);
                            if (children.length === 0) { hasLimit = false; maxAllowed = Infinity; } 
                            else {
                                let minSets = Infinity;
                                children.forEach(child => {
                                    let cCode = String(child['ID Компонент']).trim(); 
                                    let multiplier = parseFloat(child['Количество']) || 1;
                                    let cRoutes = globalRoutesByDetail[cCode] || []; 
                                    let cDone = 0; let isManufactured = (cRoutes.length > 0);
                                    if (isManufactured) { 
                                        let lastRoute = cRoutes[cRoutes.length - 1]; 
                                        let cOpKey = cCode + '_' + String(lastRoute['Име на операция']).trim(); 
                                        cDone = completedOps[cOpKey] || 0; 
                                    } 
                                    else { 
                                        cDone = getSkladQty(cCode) + (completedOps[cCode + '_Възстановен'] || 0); 
                                    }
                                    let possibleSets = Math.floor(cDone / multiplier);
                                    if (possibleSets < minSets) minSets = possibleSets;
                                    if (possibleSets <= 0) { 
                                        let loc = isManufactured ? "Отчети" : "Склад"; 
                                        blockingReasons.push(`${cCode} (${cDone} бр. в ${loc})`); 
                                    }
                                });
                                if (minSets === Infinity) minSets = 0; maxAllowed = minSets - consumedHere;
                            }
                        }
                        
                        if (maxAllowed < 0) maxAllowed = 0; let isBlocked = hasLimit && maxAllowed <= 0; let machineName = route['Машина'] || '';
                        if (currentMachine && currentMachine.trim() !== "") { let selectedMachines = currentMachine.split(',').map(m => m.toLowerCase().trim()); let match = selectedMachines.some(m => machineName.toLowerCase().includes(m)); if (!match) return; }

                        // ПРЕМАХВАМЕ ПОВТАРЯЩИТЕ СЕ ПРИЧИНИ В ЧЕРВЕНОТО ПОЛЕ
                        blockingReasons = [...new Set(blockingReasons)];

                        let defaultInput = (effectivePlanQty - doneQty > 0) ? (effectivePlanQty - doneQty) : 0;
                        if (hasLimit && defaultInput > maxAllowed) defaultInput = maxAllowed;
                        if (defaultInput <= 0 && !hasLimit) defaultInput = 1; 
                        if (defaultInput <= 0 && isBlocked) defaultInput = 0;
                        let safeId = (planId + '_' + code + '_n' + nodeIndex + '_op' + idx).replace(/[^a-zA-Z0-9а-яА-Я_]/g, '_');

                        globalTasks.push({ id: safeId, plan_id: planId, name: code, internalName: namesMap[code.toLowerCase()] || '', op: opName, opNum: parseInt(route['№ Операция']) || 0, next_op: idx < routes.length - 1 ? String(routes[idx+1]['Име на операция']).trim() : "Готово", machine: machineName, drawing_link: route['Линк към чертеж'], sop_link: route['Линк към СОП'], desc: route['Описание'], type: idx === routes.length - 1 ? "ЗЕЛЕНА" : "СИНЯ", defaultQty: defaultInput, maxAllowed: maxAllowed, hasLimit: hasLimit, isBlocked: isBlocked, blockingReasons: blockingReasons, totalNeed: effectivePlanQty, totalDone: doneQty });
                    });
                });
            }
            globalTasks.sort((a, b) => a.opNum - b.opNum); renderTasks(globalTasks);
        } catch (err) { console.error(err); document.getElementById('tasksContainer').innerHTML = '<div style="text-align:center; padding: 40px; color:#ef4444; font-weight:bold;">❌ Грешка:<br>' + err.message + '</div>'; }
      }

      function renderTasks(tasks) {
        var container = document.getElementById('tasksContainer');
        let filteredTasks = tasks;
        if (currentTaskFilter === 'ready') filteredTasks = tasks.filter(t => !t.isBlocked);
        else if (currentTaskFilter === 'blocked') filteredTasks = tasks.filter(t => t.isBlocked);

        if(filteredTasks.length === 0) { 
            let msg = currentTaskFilter === 'all' ? '🎉 Всички задачи са изпълнени!' : 'Няма задачи в тази категория.';
            container.innerHTML = `<div style="text-align:center; padding: 40px; font-size:1.3em; color: #16a34a; font-weight: 900;">${msg}</div>`; 
            return; 
        }
        
        var html = '';
        filteredTasks.forEach(function(t) {
          let borderStyle = 'border-left: 6px solid #3b82f6;'; let partCode = t.name; let internalNameHtml = t.internalName ? `<div class="detail-code">${t.internalName}</div>` : '';
          let linkHtml = t.drawing_link && t.drawing_link.startsWith('http') ? `<a href="${t.drawing_link}" target="_blank">${partCode} 🔗</a>` : partCode;
          var sopHtml = (t.sop_link && t.sop_link.startsWith('http')) ? `<a href="${t.sop_link}" target="_blank" style="display:inline-block; margin-bottom:12px; background:#f59e0b; color:white; padding:6px 12px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:12px;">📑 Отвори СОП</a>` : '';
          var descHtml = t.desc ? `<div style="background-color: #fef9c3; border-left: 4px solid #eab308; padding: 10px; margin-bottom: 12px; font-size: 13px; color: #854d0e; font-weight: 700; border-radius: 4px;">💡 ${t.desc}</div>` : '';
          var bomBadgeHtml = ''; var actionButtonHtml = ''; var inputMaxHtml = t.hasLimit ? `max="${t.maxAllowed}"` : '';

          if (t.isBlocked) {
              let reasonsText = t.blockingReasons.length > 0 ? t.blockingReasons.join(', ') : "Предходни детайли";
              bomBadgeHtml = `<div style="background-color: #fef2f2; border: 1px solid #fecaca; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; color: #991b1b; font-weight: 700; text-align: center;">🚫 Липсва: ${reasonsText}</div>`;
              actionButtonHtml = `<button disabled style="background-color: #94a3b8; color: white; width: 100%; padding: 16px; font-size: 1.15em; font-weight: 800; border: none; border-radius: 10px;">🛑 БЛОКИРАНА ЗАДАЧА</button>`;
          } else if (t.hasLimit) {
              bomBadgeHtml = `<div style="background-color: #dcfce7; border: 1px solid #bbf7d0; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; color: #166534; font-weight: 800; text-align: center;">📦 Възможни: ${t.maxAllowed} бр.</div>`;
              if (!isUserCheckedIn) actionButtonHtml = `<button disabled style="background-color: #94a3b8; color: white; width: 100%; padding: 16px; font-size: 1.15em; font-weight: 800; border: none; border-radius: 10px; cursor: not-allowed;">🛑 ПЪРВО ВХОД ЗА ДЕНЯ</button>`;
              else actionButtonHtml = `<button onclick="claimCurrentTaskDOM('${t.id}')" style="background-color: #2563eb; color: white; width: 100%; padding: 16px; font-size: 1.15em; font-weight: 800; border: none; border-radius: 10px; cursor:pointer; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);">🚀 ПОЕМИ ЗАДАЧА</button>`;
          } else {
              bomBadgeHtml = `<div style="background-color: #e0e7ff; border: 1px solid #c7d2fe; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; color: #3730a3; font-weight: 800; text-align: center;">⚡ Първа стъпка (свободно производство)</div>`;
              if (!isUserCheckedIn) actionButtonHtml = `<button disabled style="background-color: #94a3b8; color: white; width: 100%; padding: 16px; font-size: 1.15em; font-weight: 800; border: none; border-radius: 10px; cursor: not-allowed;">🛑 ПЪРВО ВХОД ЗА ДЕНЯ</button>`;
              else actionButtonHtml = `<button onclick="claimCurrentTaskDOM('${t.id}')" style="background-color: #2563eb; color: white; width: 100%; padding: 16px; font-size: 1.15em; font-weight: 800; border: none; border-radius: 10px; cursor:pointer; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);">🚀 ПОЕМИ ЗАДАЧА</button>`;
          }

          html += `
            <div class="card" id="card_${t.id}" style="${borderStyle}">
              <div class="task-header"><span class="plan-label">ПЛАН: ${t.plan_id.replace('_', ' ')}</span><span class="qty-badge">${t.totalNeed} бр.</span></div>
              <div class="detail-info"><div class="internal-name">${linkHtml}</div>${internalNameHtml}</div>
              ${sopHtml} ${descHtml}
              <div class="route-flow"><span class="op-active">▶ ${t.op}</span><span class="route-arrow">➔</span><span class="op-pending">${t.next_op}</span></div>
              ${bomBadgeHtml}
              <div id="free_state_${t.id}">${actionButtonHtml}</div>
              <div id="focus_state_${t.id}" style="display: none;">
                <div style="background-color: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 5px; border: 2px solid #bae6fd;">
                  <p style="color: #0369a1; font-weight: 900; text-align:center; margin-top:0; font-size: 1.1em;">🟢 В ПРОЦЕС НА РАБОТА</p>
                  <div style="display:flex; justify-content:space-between; margin-bottom: 5px; font-size: 0.85em; font-weight:bold; color: #64748b;"><span>Готови до момента:</span><span>${t.totalDone} бр.</span></div>
                  <input type="number" id="qty_${t.id}" value="${t.defaultQty}" ${inputMaxHtml} inputmode="numeric" style="margin-bottom:15px;">
                  <div style="display: flex; gap: 10px;">
                    <button class="btn" id="btn_${t.id}" onclick="finishTask('${t.id}', this)">✅ ОТЧЕТИ</button>
                    <button class="btn-danger" id="btn_scrap_${t.id}" onclick="reportScrap('${t.id}', this)">БРАК</button>
                  </div>
                  <button onclick="pauseTaskDOM('${t.id}')" style="background: white; color: #475569; border: 2px solid #cbd5e1; padding: 14px; border-radius: 8px; font-weight: 800; width: 100%; margin-top: 15px; cursor: pointer;">📋 ВРЪЩАНЕ НАЗАД</button>
                </div>
              </div>
            </div>`;
        });
        container.innerHTML = html;
      }

      function claimCurrentTaskDOM(taskId) {
        if (navigator.vibrate) navigator.vibrate(50); activeTaskId = taskId; 
        document.querySelectorAll('.card').forEach(c => { if (c.id !== 'card_' + taskId) c.style.display = 'none'; });
        document.getElementById('free_state_' + taskId).style.display = 'none'; document.getElementById('focus_state_' + taskId).style.display = 'block';
        window['startTime_' + taskId] = new Date().toISOString(); window.scrollTo(0,0);
      }

      function pauseTaskDOM(taskId) {
        if (navigator.vibrate) navigator.vibrate(50); activeTaskId = null; 
        document.querySelectorAll('.card').forEach(c => c.style.display = 'flex'); 
        document.getElementById('free_state_' + taskId).style.display = 'block'; document.getElementById('focus_state_' + taskId).style.display = 'none';
      }

      async function finishTask(taskId, btn) {
        var inputElem = document.getElementById('qty_' + taskId); if (!inputElem) return; var val = parseFloat(inputElem.value);
        if(isNaN(val) || val <= 0) { Swal.fire('Грешка', 'Въведи валидна бройка!', 'error'); return; }
        let taskData = globalTasks.find(t => t.id === taskId);
        if (taskData.hasLimit && val > taskData.maxAllowed) { Swal.fire('Невъзможно', `Разполагаш с материали само за ${taskData.maxAllowed} бр.!`, 'error'); return; }

        Swal.fire({ title: 'Сигурен ли си?', html: `Ще отчетеш <b style="color:#16a34a; font-size:1.2em;">${val} здрави бройки</b>.`, icon: 'question', showCancelButton: true, confirmButtonColor: '#16a34a', confirmButtonText: '🟢 ДА, ПРЕДАЙ', cancelButtonText: 'Отказ'
        }).then(async (result) => {
          if (result.isConfirmed) {
            btn.disabled = true; btn.innerHTML = "ЗАПИС..."; Swal.fire({ title: 'Отчитане...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            try {
                let startedAt = window['startTime_' + taskId] || new Date().toISOString();
                const { error } = await client.from('otcheti').insert([{ "ID Детайл": taskData.name, "Оператор": currentOperator, "Количество": val, "Операция": taskData.op, "Статус": "Отчетено", "Дата": new Date().toISOString(), "Време Старт": startedAt }]);
                if(error) throw error;
                addLogToHistory('ГОТОВО', val, taskId); activeTaskId = null; 
                Swal.fire({ icon: 'success', title: 'Браво!', text: 'Отчетени: ' + val + ' бр.', timer: 1500, showConfirmButton: false }).then(() => { loadTasks(); });
            } catch(err) { Swal.fire('❌ Грешка при запис', err.message, 'error'); btn.disabled = false; btn.innerHTML = "✅ ОТЧЕТИ"; }
          }
        });
      }

      async function reportScrap(taskId, btn) {
        var inputElem = document.getElementById('qty_' + taskId); if (!inputElem) return; var val = parseFloat(inputElem.value);
        if(isNaN(val) || val <= 0) { Swal.fire('Грешка', 'Въведи валидна бройка!', 'error'); return; }
        let taskData = globalTasks.find(t => t.id === taskId);
        if (taskData.hasLimit && val > taskData.maxAllowed) { Swal.fire('Невъзможно', `Имаш материал само за ${taskData.maxAllowed} бр.!`, 'error'); return; }

        if (taskData.name.includes('#')) {
            let children = globalBomData.filter(b => String(b['ID Родител']).trim() === taskData.name);
            if (children.length > 0) {
                let checkboxHtml = '<div style="text-align:left; margin-top:15px; font-size:14px; max-height: 250px; overflow-y: auto;"><p style="color:#e74c3c; font-weight:bold; margin-bottom:12px;">Кои компоненти вътре бяха счупени?<br><span style="font-size: 0.8em; color: #64748b;">(Отмаркирайте спасените детайли)</span></p>';
                children.forEach(c => { let cName = String(c['ID Компонент']).trim(); checkboxHtml += `<label style="display:flex; align-items:center; margin-bottom:8px; padding:12px; background:#f8fafc; border-radius:6px; border:1px solid #cbd5e1;"><input type="checkbox" class="scrap-child-cb" value="${cName}" checked style="transform: scale(1.5); margin-right:15px;"><span style="font-weight:700; font-size: 1.1em; color: #1e293b;">${cName}</span></label>`; });
                checkboxHtml += '</div>';
                const { value: formValues, isConfirmed } = await Swal.fire({ title: 'Бракуване', html: `Ще бракувате <b>${val} бр.</b><br>` + checkboxHtml, icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'Да, бракувай!', cancelButtonText: 'Отказ', preConfirm: () => { let scrapped = []; document.querySelectorAll('.scrap-child-cb:checked').forEach(cb => scrapped.push(cb.value)); return scrapped; } });
                if (isConfirmed) await executeScrapLogic(taskData, val, children, formValues);
                return;
            }
        }
        Swal.fire({ title: 'Сигурен ли си?', text: "⚠️ БРАКУВАШ " + val + " бр.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'Да, бракувай!', cancelButtonText: 'Отказ' }).then(async (result) => { if (result.isConfirmed) await executeScrapLogic(taskData, val, [], []); });
      }

      async function executeScrapLogic(taskData, val, allChildren, scrappedChildrenNames) {
          Swal.fire({ title: 'Отразяване на брака...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
          try {
              let startedAt = window['startTime_' + taskData.id] || new Date().toISOString();
              let inserts = [{ "ID Детайл": taskData.name, "Оператор": currentOperator, "Количество": val, "Операция": taskData.op, "Статус": "Брак", "Дата": new Date().toISOString(), "Време Старт": startedAt }];

              allChildren.forEach(child => {
                  let cName = String(child['ID Компонент']).trim();
                  if (!scrappedChildrenNames.includes(cName)) {
                      let multiplier = parseFloat(child['Количество']) || 1; let savedQty = val * multiplier;
                      let cRoutes = globalRoutesByDetail[cName] || []; let opToLog = "Възстановен"; 
                      if (cRoutes.length > 0) opToLog = String(cRoutes[cRoutes.length - 1]['Име на операция']).trim();
                      inserts.push({ "ID Детайл": cName, "Оператор": "СИСТЕМА (Спасен)", "Количество": savedQty, "Операция": opToLog, "Статус": "Отчетено", "Дата": new Date().toISOString(), "Време Старт": startedAt });
                  }
              });

              const { error } = await client.from('otcheti').insert(inserts);
              if (error) throw error; addLogToHistory('БРАК', val, taskData.id); Swal.close(); activeTaskId = null; loadTasks(); 
          } catch(err) { Swal.fire('❌ Грешка при запис', err.message, 'error'); }
      }
      
      window.onload = initTerminal;
    </script>
  </body>
</html>
