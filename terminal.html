<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MES Терминал</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #1c1e21; overflow-x: hidden; }
      .container { padding: 10px; display: flex; flex-direction: column; align-items: center; }
      
      .app-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
      .editable-header { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px; border-radius: 6px; transition: background 0.2s; }
      .editable-header:active { background: #f1f5f9; }
      .edit-icon { font-size: 0.9em; opacity: 0.4; }
      
      .machine-title { font-weight: 800; color: #2980b9; text-transform: uppercase; font-size: 1.1em;}
      .operator-name { font-size: 0.85em; color: #7f8c8d; font-weight: bold; }
      #tasksContainer { width: 100%; max-width: 450px; margin-top: 15px; }
      .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; position: relative; }
      .card-blue { border-left: 8px solid #3498db; }
      .card-green { border-left: 8px solid #2ecc71; }
      .op-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
      .detail-title { font-size: 1.1em; font-weight: 800; color: #2c3e50; line-height: 1.2; max-width: 70%; }
      .qty-badge { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9em; font-weight: bold; }
      input[type="number"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1.3em; font-weight: bold; box-sizing: border-box; }
      .btn, .btn-danger { color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; }
      .btn { background: #16a34a; flex: 1; }
      .btn-danger { background: #e74c3c; flex: 0.4; }
      .poka-yoke { margin-top: 12px; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 0.85em; }
      .status-ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
      .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
      
      .local-history { display: none; position: fixed; bottom: 80px; right: 15px; background: rgba(255,255,255,0.98); border: 1px solid #cbd5e1; padding: 15px 12px 12px 12px; border-radius: 12px; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-size: 13px; z-index: 9000; }
      .local-history h4 { margin: 0 0 10px 0; color: #475569; text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;}
      .history-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
      .history-item { padding: 8px 0; border-bottom: 1px dashed #e2e8f0; color: #334155; display: flex; flex-direction: column; }
      .history-item:last-child { border-bottom: none; }
      .history-time { color: #64748b; font-weight: bold; font-size: 11px; margin-bottom: 2px;}
      
      .history-toggle-btn { position: fixed; bottom: 15px; right: 15px; background: #334155; color: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 9001; display: flex; justify-content: center; align-items: center; transition: background 0.2s; }
      .history-toggle-btn:active { background: #1e293b; transform: scale(0.95); }
      .close-history-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: none; font-size: 16px; cursor: pointer; color: #94a3b8; font-weight: bold; }
    </style>
  </head>
  <body>
    <div class="app-header">
      <div class="editable-header" onclick="changeOperator()" title="Смени оператор">
        <div>
          <div style="font-weight:bold; color:#34495e;">MES ТЕРМИНАЛ</div>
          <div class="operator-name" id="uiOperatorName">ОПЕРАТОР</div>
        </div>
        <span class="edit-icon">✏️</span>
      </div>
      
      <div class="editable-header" onclick="changeMachine()" title="Смени машина">
        <div class="machine-title" id="uiMachineName">ВСИЧКИ</div>
        <span class="edit-icon">✏️</span>
      </div>
    </div>
    
    <div class="container">
      <div id="tasksContainer">
         <div id="loadingMsg" style="text-align:center; padding: 20px; font-weight:bold; color:#7f8c8d;">Търсене на задачи... 🔍</div>
         <div id="cardsArea"></div>
      </div>
    </div>

    <button class="history-toggle-btn" onclick="toggleHistory()" title="Покажи история">🕒</button>

    <div class="local-history" id="historyPanel">
      <button class="close-history-btn" onclick="toggleHistory()">✖</button>
      <h4>🕒 История на този таблет</h4>
      <ul id="historyList" class="history-list">
        <li class="history-item" style="color:#94a3b8; text-align:center;">Няма скорошни действия</li>
      </ul>
    </div>

  <script>
      const client = supabase.createClient(
        'https://zdythzcgcjxwbxufunuh.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpkeXRoemNnY2p4d2J4dWZ1bnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTcxNTMsImV4cCI6MjA5NjE5MzE1M30.XGZX5DHhJCGz9X5s__3iuSghukjanyJmGKv8MLig_jE'
      );

      let currentOperator = "";
      let currentMachine = "";
      let globalTasks = []; 
      let localHistoryData = [];
      let globalBomData = [];
      let globalRoutesByDetail = {};

      function updateHistoryUI() {
        var list = document.getElementById('historyList');
        if (localHistoryData.length === 0) {
          list.innerHTML = '<li class="history-item" style="color:#94a3b8; text-align:center;">Няма скорошни действия</li>';
          return;
        }
        var html = '';
        localHistoryData.forEach(item => {
           var color = item.type === 'БРАК' ? '#e74c3c' : '#16a34a';
           html += `<li class="history-item">
                      <span class="history-time">${item.time}</span>
                      <span><span style="color:${color}; font-weight:bold;">${item.qty} бр.</span> ${item.name}</span>
                    </li>`;
        });
        list.innerHTML = html;
      }

      function toggleHistory() {
        var panel = document.getElementById('historyPanel');
        panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
      }

      function addLogToHistory(type, qty, taskId) {
         var now = new Date();
         var timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
         var titleEl = document.querySelector('#card_' + taskId + ' .detail-title');
         var name = titleEl ? titleEl.innerText.replace(' 🔗', '') : 'Детайл';
         
         localHistoryData.unshift({ time: timeStr, type: type, qty: qty, name: name });
         if (localHistoryData.length > 6) localHistoryData.pop(); 
         updateHistoryUI();
      }

      async function initTerminal() {
          currentOperator = localStorage.getItem('mes_operator');
          let savedMachine = localStorage.getItem('mes_machine');

          if (!currentOperator) {
              const { value: opName } = await Swal.fire({
                  title: 'Добър ден!',
                  text: 'Моля, въведете своето име:',
                  input: 'text',
                  allowOutsideClick: false,
                  confirmButtonText: 'Продължи',
                  confirmButtonColor: '#2563eb'
              });
              currentOperator = (opName && opName.trim() !== "") ? opName.trim() : "Оператор";
              localStorage.setItem('mes_operator', currentOperator);
          }
          document.getElementById('uiOperatorName').innerText = currentOperator;

          if (savedMachine === null) {
              await changeMachine(true); 
          } else {
              currentMachine = savedMachine;
              document.getElementById('uiMachineName').innerText = currentMachine || "ВСИЧКИ";
              loadTasks();
          }
      }

      async function changeOperator() {
          const { value: opName } = await Swal.fire({
              title: 'Смяна на оператор',
              input: 'text',
              inputValue: currentOperator,
              showCancelButton: true,
              confirmButtonText: 'Запази',
              cancelButtonText: 'Отказ',
              confirmButtonColor: '#2563eb'
          });
          if (opName && opName.trim() !== "") {
              currentOperator = opName.trim();
              localStorage.setItem('mes_operator', currentOperator);
              document.getElementById('uiOperatorName').innerText = currentOperator;
          }
      }

      async function changeMachine(isInitial = false) {
          Swal.fire({ title: 'Зареждане на машини...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
          
          try {
              const { data, error } = await client.from('marshruti').select('Машина').limit(10000);
              if (error) throw error;
              
              let uniqueMachines = [];
              if (data) {
                  data.forEach(r => {
                      let m = r['Машина'];
                      if (m && m.trim() !== "" && !uniqueMachines.includes(m.trim())) {
                          uniqueMachines.push(m.trim());
                      }
                  });
              }
              uniqueMachines.sort(); 

              let checkboxHtml = '<div style="text-align:left; margin-top:15px; max-height: 300px; overflow-y: auto;">';
              let currentSelections = currentMachine ? currentMachine.split(',') : [];
              
              // Бутони за бърз избор
              checkboxHtml += `
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button type="button" onclick="document.querySelectorAll('.machine-cb').forEach(cb => cb.checked = true)" style="flex:1; padding:10px; background:#e0f2fe; color:#0369a1; border:1px solid #bae6fd; border-radius:6px; font-weight:bold; cursor:pointer;">☑️ Всички</button>
                    <button type="button" onclick="document.querySelectorAll('.machine-cb').forEach(cb => cb.checked = false)" style="flex:1; padding:10px; background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; border-radius:6px; font-weight:bold; cursor:pointer;">☐ Изчисти</button>
                </div>
              `;

              uniqueMachines.forEach(m => {
                  let isChecked = currentSelections.includes(m) ? 'checked' : '';
                  checkboxHtml += `
                    <label style="display:flex; align-items:center; margin-bottom:10px; cursor:pointer; padding:10px; background:#f8fafc; border-radius:6px; border:1px solid #cbd5e1;">
                        <input type="checkbox" class="machine-cb" value="${m}" ${isChecked} style="transform: scale(1.5); margin-right:15px;">
                        <span style="font-weight:700;">${m}</span>
                    </label>`;
              });
              checkboxHtml += '</div>';

              Swal.close();

              const { isConfirmed } = await Swal.fire({
                  title: 'Избери работни места',
                  html: checkboxHtml,
                  showCancelButton: !isInitial,
                  allowOutsideClick: !isInitial,
                  confirmButtonText: 'Потвърди избор',
                  cancelButtonText: 'Отказ',
                  confirmButtonColor: '#2563eb',
                  preConfirm: () => {
                      let selected = [];
                      document.querySelectorAll('.machine-cb:checked').forEach(cb => selected.push(cb.value));
                      return selected;
                  }
              });

              if (isConfirmed) {
                  let finalSelection = [];
                  document.querySelectorAll('.machine-cb:checked').forEach(cb => finalSelection.push(cb.value));
                  
                  currentMachine = finalSelection.join(',');
                  localStorage.setItem('mes_machine', currentMachine);
                  document.getElementById('uiMachineName').innerText = (finalSelection.length > 0) ? finalSelection.join(', ') : "ВСИЧКИ";
                  loadTasks();
              }
          } catch (err) {
              console.error(err);
              Swal.fire('Грешка', 'Не успях да заредя списъка.', 'error');
          }
      }

      async function loadTasks() {
        document.getElementById('cardsArea').innerHTML = '';
        document.getElementById('loadingMsg').style.display = 'block';
        
        try {
            const [plansRes, bomRes, routesRes, reportsRes, skladRes] = await Promise.all([
                client.from('plan').select('*').limit(10000),
                client.from('bom').select('*').limit(10000),
                client.from('marshruti').select('*').limit(10000),
                client.from('otcheti').select('*').limit(10000), 
                client.from('sklad').select('*').limit(10000) 
            ]);

            if (plansRes.error) throw plansRes.error;
            if (bomRes.error) throw bomRes.error;
            if (routesRes.error) throw routesRes.error;
            if (reportsRes.error) throw reportsRes.error;

            globalBomData = bomRes.data || [];
            globalRoutesByDetail = {};
            
            routesRes.data.forEach(r => {
                let code = String(r['Код на детайла']).trim();
                if(!globalRoutesByDetail[code]) globalRoutesByDetail[code] = [];
                globalRoutesByDetail[code].push(r);
            });
            Object.keys(globalRoutesByDetail).forEach(code => {
                globalRoutesByDetail[code].sort((a, b) => parseInt(a['№ Операция']) - parseInt(b['№ Операция']));
            });

            let completedOps = {}; 
            let scrappedOps = {}; 

            reportsRes.data.forEach(r => {
                let key = String(r['ID Детайл']).trim() + '_' + String(r['Операция']).trim();
                let qty = parseFloat(r['Количество']) || 0;
                if (r['Статус'] === 'Брак') {
                    if(!scrappedOps[key]) scrappedOps[key] = 0;
                    scrappedOps[key] += qty;
                } else {
                    if(!completedOps[key]) completedOps[key] = 0;
                    completedOps[key] += qty;
                }
            });

            let skladData = skladRes.data || [];
            let getSkladQty = (code) => {
                let codeLower = code.toLowerCase();
                let item = skladData.find(s => String(s['ID Детайл']).trim().toLowerCase() === codeLower);
                return item ? (parseFloat(item['Остатък']) || 0) : 0;
            };

            let planGroups = {}; 

            plansRes.data.forEach(plan => {
                let planId = String(plan['Месец']).trim() + '_' + String(plan['Година']).trim();
                let rootItem = String(plan['ID Детайл']).trim();
                let targetQty = parseFloat(plan['Целево количество']) || 0;

                if(!planGroups[planId]) planGroups[planId] = [];

                planGroups[planId].push({
                    детайл_код: rootItem,
                    текущ_родител: '',
                    общо_необходимо_количество: targetQty
                });

                function traverseAndAdd(parentName, parentBaseQty) {
                    let parentScrapTotal = 0;
                    for (let key in scrappedOps) {
                        if (key.startsWith(parentName + '_')) parentScrapTotal += scrappedOps[key];
                    }
                    let actualParentNeed = parentBaseQty + parentScrapTotal;

                    let children = globalBomData.filter(b => String(b['ID Родител']).trim() === parentName);
                    children.forEach(c => {
                        let childName = String(c['ID Компонент']).trim();
                        let multiplier = parseFloat(c['Количество']) || 1;
                        let childNeededQty = actualParentNeed * multiplier;

                        planGroups[planId].push({
                            детайл_код: childName,
                            текущ_родител: parentName,
                            общо_необходимо_количество: childNeededQty
                        });

                        traverseAndAdd(childName, childNeededQty);
                    });
                }
                traverseAndAdd(rootItem, targetQty);
            });

            globalTasks = [];

            for(let planId in planGroups) {
                let bomNodes = planGroups[planId];
                let getChildren = (parentCode) => bomNodes.filter(n => String(n.текущ_родител).trim() === parentCode);
                
                bomNodes.forEach((node, nodeIndex) => {
                    let code = String(node.детайл_код).trim();
                    let planQty = parseFloat(node.общо_необходимо_количество) || 0;
                    
                    let routes = globalRoutesByDetail[code] || [];
                    if(routes.length === 0) return; 
                    
                    routes.forEach((route, idx) => {
                        let opName = String(route['Име на операция']).trim();
                        let opKey = code + '_' + opName;
                        
                        let doneQty = completedOps[opKey] || 0;
                        let scrapQty = scrappedOps[opKey] || 0;
                        let consumedHere = doneQty + scrapQty; 
                        
                        let scrapStrictlyDownstream = 0;
                        for(let j = idx + 1; j < routes.length; j++) {
                            let dKey = code + '_' + String(routes[j]['Име на операция']).trim();
                            scrapStrictlyDownstream += (scrappedOps[dKey] || 0);
                        }
                        
                        let effectivePlanQty = planQty + scrapStrictlyDownstream;

                        if(doneQty >= effectivePlanQty) return; 
                        
                        let maxAllowed = 0;
                        let hasLimit = true;
                        let blockingReasons = []; 

                        if (idx > 0) {
                            let prevRoute = routes[idx - 1];
                            let prevOpName = String(prevRoute['Име на операция']).trim();
                            let prevOpKey = code + '_' + prevOpName;
                            let prevDoneQty = completedOps[prevOpKey] || 0;
                            
                            maxAllowed = prevDoneQty - consumedHere;
                            
                            if (maxAllowed <= 0) {
                                blockingReasons.push(`Оп. ${prevOpName} (${prevDoneQty} готови)`);
                            }
                        } else {
                            let children = getChildren(code);
                            if (children.length === 0) {
                                hasLimit = false;
                                maxAllowed = Infinity;
                            } else {
                                let minSets = Infinity;
                                children.forEach(child => {
                                    let cCode = String(child.детайл_код).trim();
                                    let cPlan = parseFloat(child.общо_необходимо_количество) || 0;
                                    let cRoutes = globalRoutesByDetail[cCode] || [];
                                    let cDone = 0;
                                    let isManufactured = (cRoutes.length > 0);
                                    
                                    if (isManufactured) {
                                        let lastRoute = cRoutes[cRoutes.length - 1];
                                        let cOpKey = cCode + '_' + String(lastRoute['Име на операция']).trim();
                                        cDone = completedOps[cOpKey] || 0;
                                    } else {
                                        cDone = getSkladQty(cCode) + (completedOps[cCode + '_Възстановен'] || 0);
                                    }
                                    
                                    if (cPlan > 0) {
                                        let multiplier = cPlan / planQty;
                                        let possibleSets = Math.floor(cDone / multiplier);
                                        if (possibleSets < minSets) minSets = possibleSets;
                                        
                                        if (possibleSets <= 0) {
                                            let loc = isManufactured ? "Отчети" : "Склад";
                                            blockingReasons.push(`${cCode} (${cDone} бр. в ${loc})`);
                                        }
                                    }
                                });
                                if (minSets === Infinity) minSets = 0;
                                maxAllowed = minSets - consumedHere;
                            }
                        }
                        
                        if (maxAllowed < 0) maxAllowed = 0;
                        let isBlocked = hasLimit && maxAllowed <= 0;
                        
                        let machineName = route['Машина'] || '';
                        let shouldShow = true;

                        if (currentMachine && currentMachine.trim() !== "") {
                            let selectedMachines = currentMachine.split(',').map(m => m.toLowerCase().trim());
                            let routeMachine = machineName.toLowerCase();
                            
                            let match = selectedMachines.some(m => routeMachine.includes(m));
                            if (!match) {
                                return; 
                            }
                        }

                        let defaultInput = (effectivePlanQty - doneQty > 0) ? (effectivePlanQty - doneQty) : 0;
                        if (hasLimit && defaultInput > maxAllowed) defaultInput = maxAllowed;
                        if (defaultInput <= 0 && !hasLimit) defaultInput = 1; 
                        if (defaultInput <= 0 && isBlocked) defaultInput = 0;

                        let safeId = (planId + '_' + code + '_n' + nodeIndex + '_op' + idx).replace(/[^a-zA-Z0-9а-яА-Я_]/g, '_');

                        globalTasks.push({
                            id: safeId,
                            plan_id: planId,
                            name: code,
                            op: opName,
                            opNum: parseInt(route['№ Операция']) || 0, // ДОБАВЕНО: Номер на операция
                            next_op: idx < routes.length - 1 ? String(routes[idx+1]['Име на операция']).trim() : "Готово",
                            machine: machineName,
                            drawing_link: route['Линк към чертеж'],
                            sop_link: route['Линк към СОП'],
                            desc: route['Описание'],
                            type: idx === routes.length - 1 ? "ЗЕЛЕНА" : "СИНЯ",
                            defaultQty: defaultInput,
                            maxAllowed: maxAllowed,
                            hasLimit: hasLimit,
                            isBlocked: isBlocked,
                            blockingReasons: blockingReasons,
                            totalNeed: effectivePlanQty, // ДОБАВЕНО: Нужни бройки
                            totalDone: doneQty           // ДОБАВЕНО: Готови бройки
                        });
                    });
                });
            }
            
            // ДОБАВЕНО: Сортиране по номер на операция
            globalTasks.sort((a, b) => a.opNum - b.opNum);
            
            renderTasks(globalTasks);

        } catch (err) {
            console.error(err);
            document.getElementById('loadingMsg').innerHTML = '❌ Критична грешка при зареждане: ' + err.message;
        }
      }

      function renderTasks(tasks) {
        document.getElementById('loadingMsg').style.display = 'none';
        var container = document.getElementById('cardsArea');
        
        if(tasks.length === 0) { 
          container.innerHTML = '<div style="text-align:center; margin-top:30px; font-size:1.2em; color: #27ae60; font-weight: bold;">🎉 Няма чакащи задачи за избраните машини!</div>';
          return;
        }
        
        var html = '';
        tasks.forEach(function(t) {
          var cardClass = (t.type === "ЗЕЛЕНА") ? "card-green" : "card-blue";
          
          var linkHtml = t.name;
          if (t.drawing_link && t.drawing_link.startsWith('http')) {
             linkHtml = `<a href="${t.drawing_link}" target="_blank" style="color: #1e3a8a; font-weight: bold; text-decoration: underline;">${t.name} 🔗</a>`;
          }

          var sopHtml = (t.sop_link && t.sop_link.startsWith('http')) 
              ? `<a href="${t.sop_link}" target="_blank" style="display:inline-block; margin-top:8px; background:#f39c12; color:white; padding:6px 12px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:12px;">📑 Отвори СОП</a>` : '';
              
          var descHtml = t.desc 
              ? `<div style="background-color: #fef9c3; border-left: 4px solid #facc15; padding: 8px; margin-top: 8px; font-size: 13px; color: #854d0e; font-weight: 600;">💡 ${t.desc}</div>` : '';

          // ПРОМЕНЕНО: Визуализация на нужните и готовите бройки
          var planBadge = `<div style="font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 4px;">ПЛАН: ${t.plan_id} | НУЖНИ: ${t.totalNeed} бр. (ГОТОВИ: ${t.totalDone} бр.) | МАШИНА: ${t.machine || 'Обща'}</div>`;

          var bomBadgeHtml = '';
          var actionButtonHtml = '';
          var inputMaxHtml = t.hasLimit ? `max="${t.maxAllowed}"` : '';

          if (t.isBlocked) {
              let reasonsText = t.blockingReasons.length > 0 ? t.blockingReasons.join(', ') : "Предходни детайли";
              bomBadgeHtml = `<div style="background-color: #fee2e2; border-left: 4px solid #ef4444; padding: 8px; margin-top: 8px; font-size: 13px; color: #991b1b; font-weight: 600;">🚫 Липсва: ${reasonsText}</div>`;
              actionButtonHtml = `<button disabled style="background-color: #94a3b8; color: white; width: 100%; padding: 18px; font-size: 1.2em; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; cursor:not-allowed;">🛑 БЛОКИРАНА ЗАДАЧА</button>`;
          } else if (t.hasLimit) {
              bomBadgeHtml = `<div style="background-color: #dcfce7; border-left: 4px solid #22c55e; padding: 8px; margin-top: 8px; font-size: 13px; color: #166534; font-weight: 600;">✅ Налични за: ${t.maxAllowed} бр.</div>`;
              actionButtonHtml = `<button onclick="claimCurrentTaskDOM('${t.id}')" style="background-color: #2563eb; color: white; width: 100%; padding: 18px; font-size: 1.2em; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; cursor:pointer;">🚀 ПОЕМИ ЗАДАЧА</button>`;
          } else {
              bomBadgeHtml = `<div style="background-color: #e0e7ff; border-left: 4px solid #6366f1; padding: 8px; margin-top: 8px; font-size: 13px; color: #3730a3; font-weight: 600;">⚡ Първа стъпка (свободно производство)</div>`;
              actionButtonHtml = `<button onclick="claimCurrentTaskDOM('${t.id}')" style="background-color: #2563eb; color: white; width: 100%; padding: 18px; font-size: 1.2em; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; cursor:pointer;">🚀 ПОЕМИ ЗАДАЧА</button>`;
          }

          html += `
            <div class="card ${cardClass}" id="card_${t.id}">
              <div class="op-header">
                <div style="flex: 1; padding-right: 10px;">
                  ${planBadge}
                  <div class="detail-title">${linkHtml}</div>
                  ${sopHtml}
                  ${descHtml}
                  ${bomBadgeHtml}
                </div>
              </div>
              <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 12px;">
                <span style="font-weight: 800; color: #2980b9; font-size: 1.1em;">▶ ${t.op}</span> 
                <span style="color: #cbd5e1; font-weight: 900;">➔</span> 
                <span style="color: #94a3b8; font-weight: 600;">${t.next_op}</span>
              </div>
              
              <div id="free_state_${t.id}" style="display: block;">
                ${actionButtonHtml}
              </div>

              <div id="focus_state_${t.id}" style="display: none;">
                <div style="background-color: #e0f2fe; padding: 15px; border-radius: 8px; margin-top: 15px; border: 2px solid #bae6fd;">
                  <p style="color: #0369a1; font-weight: bold; text-align:center; margin-top:0;">🟢 Работиш по тази задача</p>
                  <input type="number" id="qty_${t.id}" value="${t.defaultQty}" ${inputMaxHtml} inputmode="numeric" style="margin-bottom:12px;">
                  <div style="display: flex; gap: 8px;">
                    <button class="btn" id="btn_${t.id}" onclick="finishTask('${t.id}', this)">✅ ОТЧЕТИ</button>
                    <button class="btn-danger" id="btn_scrap_${t.id}" onclick="reportScrap('${t.id}', this)">БРАК</button>
                  </div>
                  <button onclick="pauseTaskDOM('${t.id}')" style="background: transparent; color: #1e3a8a; border: 1px solid #3498db; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer;">📋 ПОЕМИ ДРУГА ЗАДАЧА</button>
                </div>
              </div>
            </div>`;
        });
        container.innerHTML = html;
      }

      function claimCurrentTaskDOM(taskId) {
        if (navigator.vibrate) navigator.vibrate(50);
        document.querySelectorAll('.card').forEach(c => { if (c.id !== 'card_' + taskId) c.style.display = 'none'; });
        document.getElementById('free_state_' + taskId).style.display = 'none';
        document.getElementById('focus_state_' + taskId).style.display = 'block';
      }

      function pauseTaskDOM(taskId) {
        if (navigator.vibrate) navigator.vibrate(50);
        document.querySelectorAll('.card').forEach(c => c.style.display = 'block');
        document.getElementById('free_state_' + taskId).style.display = 'block';
        document.getElementById('focus_state_' + taskId).style.display = 'none';
      }

      async function finishTask(taskId, btn) {
        var inputElem = document.getElementById('qty_' + taskId);
        if (!inputElem) return; 
        var val = parseFloat(inputElem.value);
        if(isNaN(val) || val <= 0) { Swal.fire('Грешка', 'Въведи валидна бройка!', 'error'); return; }

        let taskData = globalTasks.find(t => t.id === taskId);
        if (taskData.hasLimit && val > taskData.maxAllowed) {
            Swal.fire('Невъзможно', `Разполагаш с материали само за ${taskData.maxAllowed} бр.!`, 'error');
            return;
        }

        Swal.fire({ 
          title: 'Сигурен ли си?', 
          html: `Ще отчетеш <b style="color:#16a34a; font-size:1.2em;">${val} здрави бройки</b>.<br>Предаваш ли ги напред?`, 
          icon: 'question', showCancelButton: true, confirmButtonColor: '#16a34a', cancelButtonColor: '#e74c3c', 
          confirmButtonText: '🟢 ДА, ПРЕДАЙ', cancelButtonText: '🔴 ОПА, ГРЕШКА'
        }).then(async (result) => {
          if (result.isConfirmed) {
            btn.disabled = true; btn.innerHTML = "ЗАПИС...";
            Swal.fire({ title: 'Отчитане...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
            
            try {
                const { error } = await client.from('otcheti').insert([{
                    "ID Детайл": taskData.name, 
                    "Оператор": currentOperator,
                    "Количество": val,
                    "Операция": taskData.op,
                    "Статус": "Отчетено",
                    "Дата": new Date().toISOString()
                }]);

                if(error) throw error;

                addLogToHistory('ГОТОВО', val, taskId); 
                Swal.fire({ icon: 'success', title: 'Браво!', text: 'Отчетени: ' + val + ' бр.', timer: 1500, showConfirmButton: false }).then(() => { loadTasks(); });
            } catch(err) {
                console.error(err);
                Swal.fire('❌ Грешка при запис', err.message || err.toString(), 'error');
                btn.disabled = false; btn.innerHTML = "✅ ОТЧЕТИ";
            }
          }
        });
      }

      async function reportScrap(taskId, btn) {
        var inputElem = document.getElementById('qty_' + taskId);
        if (!inputElem) return; var val = parseFloat(inputElem.value);
        if(isNaN(val) || val <= 0) { Swal.fire('Грешка', 'Въведи валидна бройка!', 'error'); return; }
        
        let taskData = globalTasks.find(t => t.id === taskId);
        if (taskData.hasLimit && val > taskData.maxAllowed) {
            Swal.fire('Невъзможно', `Имаш материал само за ${taskData.maxAllowed} бр.!`, 'error');
            return;
        }

        if (taskData.name.includes('#')) {
            let children = globalBomData.filter(b => String(b['ID Родител']).trim() === taskData.name);
            
            if (children.length > 0) {
                let checkboxHtml = '<div style="text-align:left; margin-top:15px; font-size:14px; max-height: 250px; overflow-y: auto;">';
                checkboxHtml += '<p style="color:#e74c3c; font-weight:bold; margin-bottom:12px;">Кои компоненти вътре бяха счупени?<br><span style="font-size: 0.8em; color: #64748b;">(Отмаркирайте спасените детайли, за да не се произвеждат пак)</span></p>';
                
                children.forEach(c => {
                    let cName = String(c['ID Компонент']).trim();
                    checkboxHtml += `<label style="display:flex; align-items:center; margin-bottom:8px; cursor:pointer; padding:12px; background:#f8fafc; border-radius:6px; border:1px solid #cbd5e1;">
                                       <input type="checkbox" class="scrap-child-cb" value="${cName}" checked style="transform: scale(1.5); margin-right:15px; cursor:pointer;">
                                       <span style="font-weight:700; font-size: 1.1em; color: #1e293b;">${cName}</span>
                                     </label>`;
                });
                checkboxHtml += '</div>';

                const { value: formValues, isConfirmed } = await Swal.fire({
                    title: 'Бракуване на ' + taskData.name,
                    html: `Ще бракувате <b>${val} бр.</b><br>` + checkboxHtml,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#e74c3c',
                    cancelButtonColor: '#94a3b8',
                    confirmButtonText: 'Да, бракувай!',
                    cancelButtonText: 'Отказ',
                    preConfirm: () => {
                        let checkboxes = document.querySelectorAll('.scrap-child-cb');
                        let scrapped = [];
                        checkboxes.forEach(cb => { if (cb.checked) scrapped.push(cb.value); });
                        return scrapped;
                    }
                });

                if (isConfirmed) {
                    await executeScrapLogic(taskData, val, children, formValues);
                }
                return;
            }
        }

        Swal.fire({ 
          title: 'Сигурен ли си?', text: "⚠️ БРАКУВАШ " + val + " бр.", icon: 'warning', 
          showCancelButton: true, confirmButtonColor: '#e74c3c', cancelButtonColor: '#94a3b8', 
          confirmButtonText: 'Да, бракувай!', cancelButtonText: 'Отказ' 
        }).then(async (result) => {
          if (result.isConfirmed) {
              await executeScrapLogic(taskData, val, [], []);
          }
        });
      }

      async function executeScrapLogic(taskData, val, allChildren, scrappedChildrenNames) {
          Swal.fire({ title: 'Отразяване на брака...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

          try {
              let inserts = [{
                  "ID Детайл": taskData.name,
                  "Оператор": currentOperator,
                  "Количество": val,
                  "Операция": taskData.op,
                  "Статус": "Брак",
                  "Дата": new Date().toISOString()
              }];

              allChildren.forEach(child => {
                  let cName = String(child['ID Компонент']).trim();
                  
                  if (!scrappedChildrenNames.includes(cName)) {
                      let multiplier = parseFloat(child['Количество']) || 1;
                      let savedQty = val * multiplier;

                      let cRoutes = globalRoutesByDetail[cName] || [];
                      let operationToLog = "Възстановен"; 

                      if (cRoutes.length > 0) {
                          let lastRoute = cRoutes[cRoutes.length - 1];
                          operationToLog = String(lastRoute['Име на операция']).trim();
                      }

                      inserts.push({
                          "ID Детайл": cName,
                          "Оператор": "СИСТЕМА (Спасен)",
                          "Количество": savedQty,
                          "Операция": operationToLog,
                          "Статус": "Отчетено",
                          "Дата": new Date().toISOString()
                      });
                  }
              });

              const { error } = await client.from('otcheti').insert(inserts);
              if (error) throw error;

              addLogToHistory('БРАК', val, taskData.id); 
              Swal.close(); 
              loadTasks(); 
          } catch(err) {
              console.error(err);
              Swal.fire('❌ Грешка при запис', err.message || err.toString(), 'error');
          }
      }
      
      window.onload = initTerminal;
    </script>
  </body>
</html>
